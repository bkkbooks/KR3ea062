body:
  text: 黃帝八十一難經解題難經解題一篇先君子所撰也元胤今謹以過庭所受之說並著於録舉衆說而證之若其剩義竊又補之冠乎拙著之首八十一難之名昉見於漢張仲景傷寒論自序而梁阮孝緒七録有黃帝衆難經之目隋書經籍志曰黃帝八十一難二卷注梁有黃帝衆難經一卷呂博望注亡蓋衆乃八十一之謂集注題曰黃帝八十一難經本義無黃帝八十一字非其舊也其以黃帝冠者正與內經同淮南子曰世俗之人多尊古而賤今故為道者必托之於神農黃帝而後能入說詳見於先子素問解題素問離合真邪論曰九九八十一篇以起黃鐘數焉古書多以此為數素靈老子皆然也虞伯圭曰古人因經設難或與門人子弟問答偶得此八十一章耳未必經之當難者止此八十一條也此說不可從陳祥道禮記講義曰太玄八十一家象八十一元士少則制衆無則制有蓋太玄取諸太極而已故其數如此老子之書終於八十一難經止於八十一皆此意歟王伯厚困學紀聞曰石林謂太玄皆老子緒餘老氏道生一一生二二生三三之為九故九而九之為八十一章太玄以一玄為三方自是為九而積之為八十一首難是問難之義帝王世紀云黃帝命雷公岐伯論經脈旁通問難八十一為難經事物紀原隋蕭吉五行大義唐李善文選七發注並引此經文曰黃帝八十一問云可以證焉唐藝文志有耆婆八十四問許詠六十四問蓋本此陳振孫書録解題載難經二卷曰難當作去聲讀歐陽圭齊曰難經先秦古文漢以來答客難等作皆出其後又文字相質難之祖也元胤按史記黃帝本紀云死生之說存亡之難索隱難猶說也凡事是非未盡假以往來之詞則曰難又上文有死生之說故此云存亡之難所以韓非著書有說林說難也八十一難之難得之其義益明或讀為平聲非也楊玄操序曰名為八十一難以其理趣深遠非卒易了故也僧幻云史記附標載楊玄操音義曰難音乃丹切黎泰辰序虞庶難經注曰世傳黃帝八十一難經謂之難者得非以人之五藏六府隱於內為邪所幹不可測知唯以脈理究其倣佛邪若脈有重十二菽者又有如按車蓋而若循雞羽者復考內外之證以參校之難乎紀天錫進難經集注表曰秦越人將黃帝素問疑難之義八十一篇重而明之故曰八十一難經滑壽曰按歐虞說則難字當為去聲余皆奴丹切此經不詳何人作隋以上則附之於黃帝唐而降則屬之於秦越人隋經籍志云黃帝八十一難二卷蓋原於帝王世紀之說也楊玄操為秦越人之所作也楊玄操序曰黃帝八十一難經者斯乃勃海秦越人所作也越人受桑君之祕術遂洞明醫道至能視徹藏府刳腸剔心以其與軒轅時扁鵲相類乃號之為扁鵲又家於盧國因命之曰盧醫世或以盧扁為二人者斯實謬矣按黃帝有內經二帙帙各九卷而其義幽賾殆難窮覽越人乃採摘英華抄撮精要二部經內凡八十一章勒成卷軸既弘暢聖言故首稱黃帝云元胤按王惟一集注本亦題曰盧國秦越人撰蓋據楊玄操之言者揚子法言曰扁鵲盧人也而醫多盧王勃云秦越人始定章句蓋勃序見文苑英華其言迂怪可疑王勃序曰黃帝八十一難是醫經之祕録也昔者岐伯以授黃帝黃帝歷九師以授伊尹伊尹以授湯湯歷六師以授太公太公授文王文王歷九師以授醫和醫和歷六師以授秦越人秦越人始定章句歷九師以授華他他歷六師以授黃公黃公以授曹夫子夫子諱元字真道自云京兆人也舊唐經籍志云黃帝八十一難經一卷秦越人撰按開元中張守節作史記正義於扁鵲傳首引楊玄操難經序則玄操開元以前人而其屬諸越人者豈創於玄操歟司馬遷云天下至今言脈者由扁鵲蓋論脈莫精於難經則其說之所以起也然謂之扁鵲所作唐而上無說實為可疑矣八十一難之目已見於仲景自序而叔和脈經士晏甲乙往往引其文則漢人所撰要之不失為古醫經亦何必論其作者本義曰史記越人傳無著難經之說隋書經籍志唐書藝文志俱有秦越人黃帝八十一難二卷之目又唐諸王侍讀張守節作史記正義於扁鵲倉公傳則全引難經文以釋其義後附載四十二難與第一難三十七難全文由此則知古傳以為越人所作者不誣也詳其設問之辭稱經言者出於素問靈樞二經而見於靈樞者尤多亦有二經無所見者豈越人別有托於古經耶經釋曰云秦越人著者始見於新唐書藝文志蓋不可定然實兩漢以前書也元胤嘗考素問其言雅奧其理亦精雖有漢人之所補綴其實多周秦古書之文若靈樞則朱子稱為淺易較之素問殆為雁行而八十一難則又其亞也何者詳玩其文語氣稍弱全類東京而所記亦多與東京諸書相出入者若元氣之稱始見於董仲舒春秋繁露揚雄解嘲而至東漢比比稱之男生於寅女生於申說文包字注高誘淮南子注離騷章句俱載其說木所以沉金所以浮出於白虎通金生於巳水生於申瀉南方火補北方水之類並是五行緯說家之言而靈素中未有道及者特見於此經其決非出西京人手可以見矣且此經診脈之法分以三部其事約易明自張仲景王叔和輩取而用之乃在醫家實為不磨之矜式然徵之素靈業已不同稽之倉公診籍亦復不合則想以其古法隱奧不遽易辨識故至東漢或罕傳其術者於是名師據素問有三部九候之稱仿而演之以作此一家言者歟丁德用曰難經為華他燼餘之文吳太醫令呂廣重編此經王文潔曰扁鵲者軒轅時扁鵲也隱居岩嶽不登於七人之列而自作八十一難經以後秦越人注之今書故稱秦越人扁鵲是特無稽之談耳姚際恆僞書考曰傷寒論序云撰用素問九卷八十一難者即指素問九卷而言也六朝人又為此書絶可笑是亦臆測胡應麟曰班志扁鵲有內經九卷外經十二卷或即今難經也此說難憑此經所論一本內經之精要以發其蘊奧而較諸素問靈樞之義往往有相詭者是果何也素靈舊稱古之內經而取兩書較之亦往往有其義相乖者內經中已如此又取素靈而篇篇較之其言有前後相畔者一書中亦復如此況難經雖原內經而其實別是一家言春秋三傳各異其辭古之說經立言率皆為然亦何遽取彼舉此而致軒輊耶徐大椿著難經經釋以此經有以內經文為釋者有悖內經文者有顛倒內經文者掎托得失而辨駁之是未通古人立言之旨吳文正公曰昔之神醫秦越人撰八十一難後人分其八十一為十三篇豫嘗慊其分篇之未當釐而正之其篇凡六一至二十二論脈二十三至二十九論經絡三十至四十七論藏府四十八至六十一論病六十二至六十八論穴衜六十九至八十一論針法夫秦氏之書與內經素靈相表裡而論脈論經絡居初豈非醫之道所當先明此者歟豫喜讀醫書以其書之比他書最古也贈醫士章伯明序按吳氏六篇視之於楊氏十三類條理區別甚為的當元以後注難經者未有表章者也本義匯考亦論分篇之義與此約略相類不及吳氏甄別之精也夫八十一難經古今之為箋釋者亡慮數十家若呂廣楊玄操虞庶丁德用其書雖亡而王翰林集注存其全說滑伯仁本義所注稍為妥適而周仲立王誠叔馮玠袁淳甫謝堅白陳廷芝等解因其纂録而得概見一二矣紀齊卿集注則本義所援殊為僅僅頃覽宋本史記扁倉傳其附標多載醫家之言中有紀注及張潔古藥注數十則近代徐大椿經釋以內經之文議難經之失其言雖似乖雅道注中濬明諸家未發之義者亦不為少矣若此數家其傳於今者可以為後學之津梁也其他則佚者居多至於明熊宗立張世賢王文潔輩不過剽襲本義之說託名於作者之林耳客歲戊寅元胤竊讀此經以王氏集注為本識其欄外以諸家之注備一時之研查既為及門之徒講於家孰奈何病目視短不可快讀細書於是別編成一書起稿於仲冬至日至於今春三月念有五日而始斷手顏曰八十一難經疏證釐為二卷以還隋志之舊且據草廬胡氏之言劙以六篇噫元胤識庸學楛雖不能以闖聖言之蘊奧評古賢之傳注矣謹考經文尋其指歸旁探群籍資為證左質以過庭之所受對床之所聞而後反之蔀暗以竭吾陋疏可通而闕可疑必有契於鄙意而止矣然豈敢謂析理剴切足以啓幽前祕擊蒙後生耶唯在講肄之際取便翻閲也覽者勿以贅述見罪幸甚文政己卯首夏初二日東都丹波元胤識
