body:
  text: 黃帝八十一難經疏證卷上一難曰十二經皆有動脈獨取寸口以決五藏六府死生吉凶之法何謂也脈經法作候呂是手足經十二脈也楊凡人兩手足各有三陰脈三陽脈合十二經脈凡脈皆雙行故有六陰六陽也自難曰至此是越人引經設問從然字以下是解釋其義余悉如此例可知也滑謂之經者以榮衛之流行經常不息者而言謂之脈者以血理分邪行體者而言也謂凡十二經皆有動脈今置不取乃獨取寸口以決死生吉凶者何耶按一難至二十二難論脈是為第一篇十二經脈動呂楊注詳舉之今不贅也丁曰十二經皆有動脈者即在兩手三部各有會動之脈也此據脈經配藏府脈位於三部者誤矣蓋經中未有此說也滑解脈字本說文說文原作衇曰從𠂢從血或從肉作脈為是而又曰脈者陌也缺妥又解經字曰經者徑也此據劉熙釋名藝文未確考經者取經緯之義言脈之正行者故其旁流者謂之絡絡猶緯也說文曰經織也從糸巠聲緯織橫絲也從糸韋聲然寸口者脈之大會手太陰之脈動也脈經作動脈呂太陰者肺之脈也肺為諸藏上蓋主通陰陽故十三經皆會手太陰寸口所以決吉凶者十二經有病見寸口知其何經之動浮沉滑澀春秋逆順知其死生也滑然者答辭諸篇仿此按素問經脈別論曰權衡以平氣口成寸以決死生又陰陽別論曰帝云氣口何以獨為五藏主岐伯曰胃者水穀之海六府之大源也五味入口藏於胃以養五藏氣氣口亦太陰也是以五藏六府之氣味皆出於胃見於氣口又玉機真藏論曰五藏者皆稟氣於胃胃者五藏之本藏氣者不能自致於手太陰必因於胃氣乃至於手太陰也故五藏各以其時自為而至於手太陰也靈樞經脈篇曰經脈者常不可見也其虛實也以氣口知之又動輸篇曰經脈十二而手太陰足少陰陽明獨動不休何也岐伯云是明胃脈也胃為五藏六府之海其清氣上注於肺肺氣從太陰而行之其行也以息往來故人一呼脈再動一吸脈亦再動呼吸不止故動而不已說文曰寸十分也人手卻一寸動脈謂之寸口從又從一人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸人一日一夜凡一萬三千五百息脈行五十度周於身漏水下百刻榮衛行陽二十五度行陰亦二十五度為一周者故五十度復會於手太陰寸口者五藏六府之所終始故法取於寸口也脈經復上有而字寸口者作太陰寸口也即六字呂人一息脈行六寸十息脈行六尺百息脈行六丈千息六十丈萬息六百丈一萬三千五百息合為八百一十丈為一周陽脈出行二十五度陰脈入行二十五度合為五十度脈行周身畢即漏水百刻亦畢也謂一日一夜漏刻盡天明日出東方脈還寸口當復更始也故曰寸口者五藏六府之所終始也紀榮者血也以榮於中衛者氣也以衛於外脈者領榮衛而行者也且血者陰也其體濡無脈以總之或聚或散烏能同灌於經氣者陽也其體詬無脈以理之或暴或厥烏能固衛於外故脈者惣之便無大過不及今但言榮衛而不言脈者謂脈惣其榮衛而行故言榮衛而不言脈也滑人謂平人不病而息數勻者也素問平人氣象論云人一呼脈再動一吸脈再動呼吸定息脈五動閏以大息命曰平人行陽行陰謂行晝行夜也徐晝夜有長短此舉其中而言其行陽行陰起止出入之法也按說文曰呼外息也從口乎聲吸內息也從口及聲息喘也從心從自自亦聲漢書揚雄傳注曰息出入氣也周禮司馬政官之職潔壺氏凡軍事懸壺以序聚柝凡喪縣壺以代哭者皆以水火守之分以晝夜注以水守壺者為沃漏也以火守壺者夜則火視刻數也分以晝夜者異晝夜漏也漏之箭晝夜共百刻冬夏之間有長短焉大史立成法有四十八箭說文曰漏以銅受水刻節晝夜百刻從水屚聲又按此段大旨原於靈樞五十營篇而其說榮衛之行取諸乎靈樞營衛生會篇曰人受氣於谷谷入於胃以傳肺五藏六府皆以受氣其清者為營濁者為衛營在脈中衛在脈外營周不休五十而復大會陰陽相貫如環無端衛氣行於陰二十五度行於陽二十五度分為晝夜二難曰脈有尺寸何謂也然尺寸者脈之大要會也滑人之一身經絡榮衛五藏六府莫不由於陰陽而或過與不及於尺寸見焉故為脈之大要會也一難言寸口為脈之大會以肺朝百脈而言也此言尺寸為脈之大要會以陰陽對待而言也徐要會言切要之地會聚之處也按說文曰尺十寸也人手卻十分動脈為寸口十寸為尺尺所以指尺規矩事也從尸從乙乙所以識也周制寸尺咫尋常仞諸度量皆以人之體為法大戴禮王言篇曰布指知寸布手知尺是語固與靈樞骨度篇所謂肘至腕長一尺二寸半不合而此段所分尺寸之法復與骨度篇不同蓋以從尺澤至魚際為一尺一寸分尺寸二部之位也從關至尺是尺內陰之所治也從關至魚際是寸口內陽之所治也舊脫口字據脈經及諸本訂補呂至尺者言從尺至關其脈見一寸而言尺者是其根本寸口長一寸而脈見九分陽數奇陰數偶也滑從關至尺澤謂之尺尺之內陰之所治也從關至魚際是寸口寸口之內陽之所治也故自魚際穴起一寸之後分為尺自尺澤穴一尺之前分為寸也徐治理也按說文曰關以木橫持門戶也從門𢇇聲此段關字亦是分界之義非指掌後高骨為關部之謂也蓋以自掌後橫紋至尺澤總為一尺一寸而分其一尺中之一寸近掌者謂之為尺以其一寸中之九分謂之為寸口寸口與尺中間相隔一分之地謂之為關是關為分界之義者可見矣靈樞動輸篇曰魚際者手魚也甲乙經曰尺澤在肘中約上動脈手太陰之所入也故分寸為尺分尺為寸丁分寸為尺者人從關至尺澤穴當一尺也於其尺內分一寸以代一尺之法是故分寸為尺分尺為寸也滑分猶別也紀陰陽者脈之本尺寸者脈之部今二難所論尺寸而不言寸尺者然順陰陽而言也尺為陰寸為陽夫尺寸之部為諸經要會之所可以察病之由來故為脈之要會從關至尺是尺內陰之所治者按傷寒論云去尺澤一尺名曰尺部是關之後去尺澤穴一尺而取尺之名也關猶隔也自關以下是尺部所屬為陰之所治也又經曰去魚一寸名曰寸口是從關至魚際穴一寸而取寸之名也以關為界自關以上寸口所屬為陽之所治也故分寸為尺分尺為寸者從關以上除寸之分下為尺也從關以下除尺之分上為寸也故陰得尺內一寸陽得寸內九分尺寸終始一寸九分故曰尺寸也辨真經釋作尺中滑老陰之數終於十故陰得尺內之一寸此尺字從關至尺澤通計十寸者而言老陽之數極於九故陽得寸內之九分此寸字指人手卻一寸而言寸為尺之始尺者寸之終云分寸者以終始對待言其實貯寸得九分尺得一寸皆陰陽之盈數也丁尺寸之法舊經有注言諸家所傳撰不同執引三寸輒相去一寸以備三才並不見一寸九分之理其一寸九分之法者蓋為尺寸之位各有陰陽始終也案一難說取寸口之法此段則更就其中分尺寸之位而復與十八難分三部之說不同學者不可一例而讀也楊注不察此理妄引諸家脈訣以傳會之並舉藏府配位之說為診候之式不足為據本義據孫思邈說云自肘腕入至魚際為一尺十分之為十寸取第九分之一寸中為脈尺位若此則更與經旨相左又不可從也素問陰陽應象大論曰按尺寸觀浮沉滑澀而知病所生又脈要精微論曰尺內兩傍則季脅也次注尺內謂尺澤之內也靈樞邪氣藏府病形篇曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩是皆循按尺膚之法內經未有就寸口分尺位之說學者又不可執彼解此也紀天錫亦辨藏府配位之妄頗為精當三難曰脈有太過有不及有陰陽相乘有覆有溢有關有格何謂也然關之前者陽之動脈當見九分而浮過者法曰太過減者法曰不及遂上魚為溢為外關內格此陰乘之脈也脈經諸本動下有也字呂過者謂脈過九分出一寸名曰太過減者脈不及九分至八分七分六分也此為不及之脈也遂上魚者出一寸至魚際也關以後者陰之動也脈當見一寸而沉過者法曰太過減者法曰不及遂入尺為覆為內關外格此陽乘之脈也脈經作關之後者呂過者謂脈出過一寸至一分二分三分四分五分此大過之脈也減者謂不滿一寸脈見七分八分或六分五分此為不及之脈虞陰陽不相榮脈乃上魚入尺故曰覆溢之脈脈既覆溢此由關格所致本經曰關格者不得盡其命而死也不病亦死張關無出之由故曰關也格者無入之理故曰格也滑遂者徑行而直前也謝氏謂遂者直上直下殊無回旋之生意外關內格謂陽外關不下陰從而內出以格拒之此陰乘陽位之脈也內關外格謂陰內閉而不上陽從而外入以格拒之此陽乘陰位之脈也覆如物之覆由上而傾於下也溢如水之溢由內而出乎外也此篇言陰陽之太過不及雖為病脈猶未至危殆若遂上魚入尺而為覆溢則死脈也此遂字最為切緊蓋承上起下之要言不然則太過不及陰陽相乘關格覆溢渾為一意漫無輕重矣按呂注有一脈四名之說誤矣此段大旨診尺寸以詳陰陽相乘之候而察關格之病也故其設問謂古之論脈者曰太過不及曰陰陽相乘曰覆溢曰關格若是說來各有所異否其答辭始舉關之前後申明陰陽之位而以過之與減解太過不及為脈之形勢以上魚入尺解覆溢為脈之現體而後結其義曰是為關格之病所成何則陰陽各乘其位者非一脈有四名其關格之稱與內經同指病候非為脈名三十七難亦據靈樞脈度篇為陰陽俱盛之病矣素問脈要精微論曰陰陽不相應病名曰關格史倉公傳曰齊侍御史成自言病頭痛臣意切其脈得肝氣肝氣濁而靜此內關之病也又曰脈法云病重而脈順清者曰內關內關之病人不知其所痛徐幹中論曰術之於斯民也猶內關之疾也非有痛癢煩苛於身情志慧然不覺疾之已深也然而期日即至則血氣暴竭故內關之疾疾之中夭而扁鵲之所甚惡也是皆陰陽不相營運人不病而死也傷寒論平脈法曰寸口脈浮而大浮為虛大為實在尺為關在寸為格關則不得小便格則吐逆是據此段而申明其證者也此段所診亦是尺寸二部本義為三部之義缺妥故曰覆溢是其真藏之脈人不病而死也脈經而作自丁此者是使陰陽不守本位有此覆溢故形不病而死也滑覆溢之脈乃孤陰獨陽上下相離之診故曰真藏之脈謂無胃氣以和之也案經釋據素問玉機真藏論五藏各有真藏脈以此段為誤然觀本義所解則其義自通楊上善太素注曰無餘物和雜故名真也見於玉機真藏論新校正四難曰脈有陰陽之法何謂也然呼出心與肺吸入腎與肝呼吸之間脾受穀味也其脈在中呂心肺在膈上藏中之陽故呼其氣出肝腎在膈下藏中之陰故吸其氣入脾者中州主養四藏故曰呼吸以受穀味滑其脈在中者在陰陽呼吸之中按經釋以受穀味三字為贅辭其說似有理浮者陽也沉者陰也故曰陰陽也心肺俱浮何以別之然浮而大散者心也浮而短澀者肺也腎肝俱沉何以別之然牢而長者肝也按之濡舉指來實者腎也脾者中州故其脈在中是陰陽之法也脈經濡作軟下有而大二字法也作脈字滑浮為陽三句此承上文而起下文之義心為陽中之陽故其脈浮而大散肺為陽中之陰其脈浮而短澀肝為陰中之陽其脈牢而長腎為陰中之陰其脈按之濡舉指來實楊按之有餘舉之不足故曰沉按之不足舉之有餘故曰浮細而遲來往難且散或一止名曰澀按之但覺堅極故曰牢大而長微強按之隱指愊愊然者謂之實丁脾者中央土也能成養四旁故隨四時而見所以經不言脈之象也按濡即軟字或作耎脈經曰軟脈極軟而浮細注軟一作濡云濡者如帛衣在水中輕手相得脈有一陰一陽一陰二陽一陰三陽有一陽一陰一陽二陰一陽三陰如此之言寸口有六脈俱動耶然此言者非有六脈俱動也謂浮沉長短滑澀也浮者陽也滑者陽也長者陽也沉者陰也短者陰也澀者陰也所謂一陰一陽者謂脈來沉而滑也一陰二陽者謂脈來沉滑而長也一陰三陽者謂脈來浮滑而長時一沉也所言一陽一陰者謂脈來浮而澀也一陽二陰者謂脈來長而沉澀也一陽三陰者謂脈來沉澀而短時一浮也各以其經所在名病逆順也脈經此下載六難全文之言作言之此言作經言如此病下有之字楊過於本位謂之長不及本位謂之短按之往來流利展轉替替然謂之滑也隨春夏秋冬觀其六脈之變則知病之逆順也紀浮沉者言其位也長短者言其體也故有形則有位有位則知病之虛實知虛實則知病所在然後別陰陽之道虛自內出實自外入滑又設問答以明陰陽脈見者不單至也惟其不單至故有此六脈相兼而見惟其相兼故有一陰一陽一陽一陰之不同也徐但浮沉可以相兼而滑澀短長不得並見其經手足三陰三陽也逆順如心脈宜浮腎脈宜沉則為順如心脈反沉腎脈反浮則為逆五難曰脈有輕重何謂也然初持脈如三菽之重與皮毛相得者肺部也如六菽之重與血脈相得者心部也如九菽之重與肌肉相得者脾部也如十二菽之重與筋平者肝部也按之至骨舉指來疾者腎部也故曰輕重舊脫腎部之部字今據脈經諸本補呂菽者豆也言脈之輕重如三豆之重在皮毛之間皮毛者肺氣所行也言肺部也心主血脈次於肺如六豆之重肝主筋又在脾下故次之腎主骨其脈沉至骨故曰腎也按脈經注曰菽者小豆言脈輕如三小豆之重呂氏作大豆據此集注所引誤脫大字也考說文曰叔豆也象叔豆生之形也詩采菽鄭玄注曰菽大豆也又閟宮稙稚菽麥釋文曰菽音叔大豆也禮檀弓啜叔飲水釋文曰叔或作菽音同大豆也蓋古人未以菽為小豆傷寒論舊注亦曰菽小豆誤矣此段借菽以稱輕重者特約略言之謂醫之以指按脈在病者膚肉上覺得其有輕重若此也蓋三部之上各有一菽之重也故合三部而稱三菽非一部之上若有三菽之重也以三乘之則若六菽之重者三部各有二菽之重九菽之重者三部各有三菽之重也十二菽之重者三部各有四菽之重也按之至骨則其深至矣更不復言輕重矣東奧服子溫良亦嘗有此說先子每稱其精核虞庶謝縉孫並謂寸關尺各有三菽之重乃知肺氣之至余當以類推之本義曰腎不言菽當如十五菽之重此說本於十六難呂注經釋曰浮而無力為輕沉而有力為重其說俱乖經旨六難曰脈有陰盛陽虛陽盛陰虛何謂也然浮之損小沉之實大故曰陰盛陽虛沉之損小浮之實大故曰陽盛陰虛是陰陽虛實之意也滑大抵輕手取之陽之分重手取之陰之分不拘何部率以是推之徐此與上文脈有陰陽之法不同上文言脈之屬於陰屬於陽平脈也此則言陰分與陽分之脈有太過不及也七難曰經言少陽之至乍小乍大乍短乍長陽明之至浮大而短太陽之至洪大而長太陰之至緊大而長少陰之至緊細而微厥陰之至沉短而敦此六者是平脈邪將病脈耶然皆王脈也其氣以何月各王幾日然冬至之後得甲子少陽王復得甲子陽明王復得甲子太陽王復得甲子太陰王復得甲子少陰王復得甲子厥陰王王各六十日六六三百六十日以成一歲此三陽三陰之王時日大要也呂少陽王正月二月其氣尚微少故其脈來進退無常陽明王三月四月其氣始萌未盛故其脈來浮大而短也太陽王五月六月其氣大盛故其脈來洪大而長太陰王七月八月乘夏余陽陰氣未盛故其脈來緊大而長少陰王九月十月陽氣衰而陰氣盛故其脈來緊細而微也厥陰王十一月十二月陰氣盛極故言厥陰其脈來沉短以敦敦者沉重也丁夫三陰三陽之氣王隨六甲以言之此法按黃帝六節藏象論曰天以六六之節成一歲其自冬至之後或在小寒之初或在大寒之後滑上文言三陽三陰之王脈此言三陽三陰之王時當其時則見其脈也歷家之說以上古十一月甲子合朔冬至為曆元蓋取夫氣朔之分齊也然天度之運與日月之行遲速不一歲各有差越人所謂冬至之後得甲子亦以此歟首稱經言二字考之樞素無所見平人氣象論太陽至洪大而長少陽至乍數乍疏乍短乍長陽明至浮大而短則雖略其說而不詳豈越人之時別有所謂上古文字耶將內經有之而後世文脫耶不可知也後凡言經言無所考者義皆仿此按脈經曰洪脈極大在指下微脈極細而軟或欲絶若有若無細脈小大於微常有但細耳八難曰寸口脈平而死者何謂也然諸十二經脈者皆繫於生氣之原所謂生氣之原者謂十二經之根本也謂腎間動氣也此五藏六府之本十二經脈之根呼吸之門三焦之原一名守邪之神故氣者人之根本也根絶則莖葉枯矣寸口脈平而死者生氣獨絶於內也呂寸口脈平而死者非應四時脈其脈狀若平和也又曰十二經皆繫於生氣之原所謂生氣之原者為十二經本原也夫氣衝之脈者起於兩腎之間主氣故言腎間動氣挾任脈上至喉咽通喘息故云呼吸之門上系手三陰三陽為支下系足三陰三陽為根故聖人引樹以設喻也其生氣之原者是三焦之府宣行榮衛邪不妄入故曰守邪之神也徐系連屬也三焦與腎同候而腎屬下焦故曰三焦之原謂所從出也滑此篇與第一難義若相悖然各有所指也一難以寸口決死生者謂寸口為脈之大會而穀氣之變見也此篇以原氣言也人之原氣盛則生絶則寸口脈雖平猶死也按腎間動氣補注經釋為命門之氣本義為人所得以生之氣不若呂注之長矣呂氏去古不遠必有師受且考之經文其言鑿鑿可據矣夫腎間則衝脈所出之地外當乎關元之分而三焦氣化之所原也其所稱動氣者何靜者為陰動者為陽動氣則陽氣之謂也素問陰陽離合論曰大沖之地名曰少陰次注大沖者腎脈與衝脈合而盛大故曰大沖又舉痛論曰衝脈起於關元隨腹直上寒氣客則脈不通脈不通則氣因之故喘動應手矣又骨空論曰衝脈者起於氣衝並少陰之經俠臍上行靈樞海論曰衝脈者為十二經之海逆順肥瘦篇曰衝脈者五藏六府之海也五藏六府皆稟焉其下者注少陰之大絡出於氣街動輸篇曰衝脈者十二經之海也與少陰之絡起於腎百病始生篇曰虛邪之中人也其著於伏沖之脈者揣之應手而動是則衝脈所出之地在於兩腎之間實為十二經脈之根本也六十六難曰臍下腎間動氣者人之生命也十二經之根本也故名曰原三焦者原氣之別使也主通行三氣經歷於五藏六府原者三焦之尊號也是則與此段之義互相發揮可見動氣者衝脈所主之氣真元之陽三焦氣化之原而生命系焉楊玄操曰腎間動氣則丹田也道士思神比丘坐禪皆行心氣於臍下者良為此也是說亦為有理荀悅申鑑曰鄰臍二寸謂之關關者所以關藏呼吸之氣以稟授四氣也故氣長者以關息氣是與此段所謂呼吸之門其義相符篇首所謂寸口者該三部而言非上部有脈下部無脈之謂呂楊注不免迂拘九難曰何以別知藏府之病耶然數者府也遲者藏也數則為熱遲則為寒諸陽為熱諸陰為寒故以別知藏府之病也呂府者陽故其脈數藏者陰故其脈來遲楊去來急促一息過五至名數也呼吸三至去來極遲故曰遲也陽脈行疾故病乃數陰脈行遲故病乃遲此直云病在藏府十難曰一脈為十變者何謂也然五邪剛柔相逢之意也假令心脈急甚者肝邪干心也心脈微急者膽邪干小腸也心脈大甚者心邪自干心也心脈微大者小腸邪自干小腸也心脈緩甚者脾邪干心也心脈微大者胃邪干小腸也心脈澀甚者肺邪干心也心脈微澀者大腸邪干小腸也心脈沉甚者腎邪干心也心脈微沉者膀胱邪干小腸也五藏各有剛柔邪故令一輒變為十也呂夏心主脈見浮大而散今反弦弦者肝脈來干心也小腸心之府脈當浮大而洪長而微弦者膽脈也心脈雖洪大當以胃氣為本今無胃氣故其脈大甚也此為心自病故言自干心也小腸心之府微大者其脈小為小腸自病故言自干也緩者脾脈乘心故令心脈緩也胃脈小緩見於心部小腸心府故言干之澀肺脈故言干心也微澀大腸脈小腸心府故曰干也沉者腎脈故言干也微沉者膀胱脈小腸心府故言干也此夏王之時心脈見如此者為失時脈楊干猶乘也剛柔陰陽也邪者不正之名非有王氣而外來干身為病者通為之邪也虞推此十變之候乃五行勝復相加故聖人謂之五邪也五藏各有表裡更相乘之一脈成十故十變也有陽有陰故曰剛柔也於本位見他脈故曰相逢相干也聖人乃以心一藏為例其餘皆可知也十一難曰經言脈不滿五十動而一止一藏無氣也何藏也然人吸者隨陰入呼者因陽出今吸不能至腎至肝而還故知一藏無氣者腎氣先盡也楊按經言持其脈口數其至也五十動而不一代者五藏皆受氣是為平和無病之人矣四十動而一代者一藏無氣難經言止本經言代按止者按之覺於指下而中止代者還尺中停久方來名曰代也止代雖兩經不同據其脈狀亦不殊別故兩存之丁五十動者是天地陰陽以漏刻為制度今陽氣虛少故不滿五十也其言動而止者謂吸不能至腎至肝而還此陽不榮於下故腎氣先絶也絶則止也此法又與生氣獨絶於內同法也滑五藏腎最在下吸氣是遠若五十動不滿而一止者知腎無所資氣當先盡盡猶衰竭也不能隨諸藏氣而上矣按此段原於靈樞根結篇而約言之也十二難曰經言五藏脈已絶於內用針者反實其外五藏脈已絶於外用針者反實其內內外之絶何以別之然五藏脈已絶於內者腎肝氣已絶於內也而醫反補其心肺五藏脈已絶於外者其心肺脈已絶於外也而醫反補其腎肝陽絶補陰陰絶補陽是謂實實虛虛損不足益有餘如此死者醫殺之耳呂心肺所以在外者其藏在膈上上氣外為榮衛浮行皮膚血脈之中故言絶於外也腎肝所以在內者其藏在膈下下氣內養筋骨故言絶於內也滑靈樞第一篇曰凡將用針必先診脈視氣之劇易乃可以治又第三篇曰所謂五藏之氣已絶於內者脈口氣內絶不至反取其外之病處與陽經之合有留針以致陽氣陽氣至則內重竭重竭則死矣其死也無氣以動故靜所謂五藏之氣已絶於外者脈口氣外絶不至反取其四末之輸有留針以致其陰氣陰氣至則陽氣反入入則逆逆則死矣其死也陰氣有餘故躁此靈樞以脈口內外言陰陽也越人以心肺腎肝內外別陰陽其理亦由是也紀氏謂此篇言針法馮玠謂此篇合入用針補寫之類當在六十難之後以例相從也徐絶者虛也不足也不絶者實也有餘也十三難曰經言見其色而不得其脈反得相勝之脈者即死得相生之脈者病即自已色之與脈當參相應為之奈何然五藏有五色皆見於面亦當與寸口尺內相應假令色青其脈當弦而急色赤其脈浮大而散色黃其脈中緩而大色白其脈浮澀而短色黑其脈沉濡而滑此所謂五色之與脈當參相應也滑靈樞第四篇曰見其色知其病命曰明按其脈知其病命曰神問其病知其處命曰工又曰色青者其脈弦赤者其脈鉤黃者其脈代白者其脈毛黑者其脈石見其色而不得其脈謂色脈之不相得也色脈既不相得看得何脈得相勝之脈即死得相生之脈病即自已已愈也參合也脈數尺之皮膚亦數脈急尺之皮膚亦急脈緩尺之皮膚亦緩脈澀尺之皮膚亦澀脈滑尺之皮膚亦滑丁數即心也所以臂內皮膚熱也急者臂內經絡滿實所以堅急也緩者肌肉消故皮膚亦緩弱也肺主燥所以臂內皮膚亦澀也腎主水其脈滑所以臂內皮膚亦滑也滑靈樞第四篇黃帝曰色脈已定別之奈何岐伯曰調其脈之緩急大小滑澀肉之堅脆而病變定矣帝曰調之奈何岐伯答曰脈急尺之皮膚亦急脈緩尺之皮膚亦緩脈小尺之皮膚亦減而少氣脈大尺之皮膚亦賁而起脈滑尺之皮膚亦滑脈澀尺之皮膚亦澀凡此變者有微有甚云此通上文所謂色脈形肉不相失按經釋曰今去經文大小字而易數字數者一息六七至之謂若皮膚則如何能數此說誤矣素問奇病論曰人有尺脈數甚筋急而見是尺膚亦有數之候也五藏各有聲色臭味當與寸口尺內相應其不相應者病也假令色青其脈浮澀而短若大而緩為相勝浮大而散若小而滑為相生也呂色青者肝也浮澀而短者肺也肺勝肝為賊邪若大而緩為脾脈也肝勝脾故言相勝也浮大而散心脈也心為肝之子若小而滑腎脈也腎為肝之母肝為腎之子子母相生故為相生也虞肝脈弦其色青其聲呼其臭羶其味酸心脈洪其色赤其聲笑其臭焦其味苦脾脈緩其色黃其聲歌其臭香其味甘肺脈澀其色白其聲哭其臭腥其味辛腎脈沉其色黑其聲呻其臭腐其味鹹此謂相應也經言知一為下工知二為中工知三為上工上工者十全九中工者十全八下工者十全六此之謂也丁上工者謂全知色脈皮膚三法相生相勝本始故治病十全其九中工知二謂不能全收故治病十全得八下工知一謂不解明於全法一心治已病故十全得六也滑此篇問答凡五節第一節為問辭第二第三節言色脈形肉不得相失第四節言五藏各有聲色臭味當與寸尺相應然假令以下但言色脈相參不言聲臭味殆闕文歟抑色之著於外者將切於參驗歟第五節則以所知之多寡為工之上下也按知三之義呂注謂解一藏為下工解二藏為中工解五藏為上工虞庶據禮記正義醫不三世之說俱為強解靈樞邪氣藏府病形篇曰善調尺者不待於寸善調脈者不待於色能參合而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六是丁說所原其義自明呂覽察賢篇曰今有良醫於此治十人而起九人所以求之萬也注以術之良故人多求之也凡十人中必有一不可治之病故全九為上也全猶愈也見於周禮疾醫職注而工則醫之謂也與知一則為工知二則為神知三則神且明矣不同此言上中下之工與韓非子經篇下君盡己之能中君盡人之力上君盡人之智語同素問有粗工良工之語說文曰工巧飾也象人有規矩也與巫同意其義可知蓋上古之醫必為祝由故通稱巫又謂之工山海經曰大荒之中有山名曰豐珇玉門日月所入有靈山巫咸巫即巫盼巫彭巫姑巫真巫禮巫抵巫謝巫羅十巫從此升降百藥爰在注群巫上下此山採藥往來也又開明東有巫彭巫抵巫陽巫履巫幾巫相注皆神醫也是則工之與巫其意相同上古俱為醫之稱也十四難曰脈有損至何謂也然至之脈一呼再至曰平三至曰離經四至曰奪精五至曰死六至曰命絶此至之脈也舊至作死據脈經虞注本義改正呂平者謂平調之脈也虞經者常也謂脈離常經之所而行過於半不在所起之經再起故曰離經也一呼四至乃陽氣亂故脈數數則氣耗耗則精無所歸獨加奪去故曰奪精五至死之漸也六至今死矣何謂損一呼一至曰離經二呼一至曰奪精三呼一至曰死四呼一至曰命絶此謂損之脈也至脈從下上損脈從上下也滑至脈從下而逆上由腎而之肺也損脈從上而行下由肺而之腎也損脈之為病奈何然一損損於皮毛皮聚而毛落二損損於血脈血脈虛少不能榮於五藏六府也三損損於肌肉肌肉消瘦飲食不為肌膚四損損於筋筋緩不能自收持也五損損於骨骨痿不能起於床反此者至於收病也從上下者骨痿不能起於床者死從下上者皮聚而毛落者死脈經消作痟本義不為作不能為至於收病當作至脈之病也云按脈經與經文同呂從上下者從肺損至腎五藏俱盡故死肺在上也從下上者從腎損之肺亦復五藏俱盡故死也虞至此推究損家病證一損肺二損心三損脾四損肝五損腎乃如第五難脈之輕重菽數按皮聚者皮膚皺臘失潤故毛脫也不能榮於五藏六府之榮字古與營通周運之義也至於收病也本義為誤文是然脈經與經文同則其訛亦久呂注曰收者取也經但載損家病不載至家病故損脈於此受病非是至家病也其言不免含糊治損之法奈何然損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精此治損之法也滑肺主氣心主血脈腎主精各以其所損而治之榮衛者血脈之所資也肝主血血虛則中不足一云肝主怒怒能傷肝故損其肝者緩其中經曰肝苦急急食甘以緩之緩者和也按一說為是虞丁注意亦爾適其寒溫此衣服起居之謂非重言飲食之義也經釋曰言治損而不言治至者蓋損至之脈雖有從上下從下上之殊而五者之病狀則一故言治損而治至之法亦備矣脈有一呼再至一吸再至有一呼三至一吸三至有一呼四至一吸四至有一呼五至一吸五至有一呼六至一吸六至有一呼一至一吸一至有再呼一至再吸一至有呼吸再至脈來如此何以別知其病也滑此再舉損至之脈為問答也蓋前之損至以五藏自病得之於內者而言此則以經絡血氣為邪所中之微甚自外得之者而言也其曰呼吸再至即一呼一至一吸一至之謂疑衍文也然脈來一呼再至一吸再至不大不小曰平一呼三至一吸三至為適得病前大後小即頭痛目眩前小後大即胸滿短氣一呼四至一吸四至病欲甚脈洪大者苦煩滿沉細者腹中痛滑者傷熱澀者中霧露一呼五至一吸五至其人當困沉細夜加浮大晝加不大不小雖困可治其有大小者為難治一呼六至一吸六至為死脈也沉細夜死浮大晝死一呼一至一吸一至名曰損人雖能行猶當著床所以然者血氣皆不足故也再呼一至再吸一至名曰無魂無魂者當死也人雖能行名曰行尸脈經欲甚作適甚死脈上有十字當著作當未再吸一至舊作呼吸再至據脈經本義改訂虞脈三至曰離經反於常經知病始得脈病反常經法曰奪精之脈脈大法曰渾渾革至如湧泉者病進欲甚之理明也陰脈細沉夜加可驗陽脈浮大晝加可知魂屬陽陽主生今脈形如是減損乃知陽絶陽絶則魂去故人死也滑前後非言寸尺猶十五難前曲後居之前後以始末言也徐前大後小病氣在陽故頭痛目眩前小後大病氣在陰故胸滿短氣洪大為陽邪外越故煩滿沉細為陰邪內陷故腹痛滑為血實故為熱澀為傷濕故中霧露此又於一息四至之病分別言之困者近於死也不大不小則晝夜不至於有加故可治即靈禁服篇所謂若引繩大小齊等之義若更參差不倫則難治矣行尸言其人生道已絶如尸之行也按澀脈難流利也何於一息八至中而現之蓋此段澀字脈經所謂一止復來之義數中有時一結也虞注為如刀刮竹之狀缺妥靈樞本神篇曰隨神往來者謂之魂說文曰魂陽氣也從鬼云聲上部有脈下部無脈其人當吐不吐者死上部無脈下部有脈雖困無能為害也所以然者譬如人之有尺樹之有根枝葉雖枯槁根本將自生脈有根本人有元氣故知不死楊上部寸口下部尺中也滑紀氏曰上部有脈下部無脈是邪實並於上即當吐也若無吐證為上無邪而下氣竭故云當死一難言寸口為五藏主也四難以胃為主其脈則主關上也此難以尺為主也此越人所以錯綜其義散見諸篇以見寸關尺各有所歸重云徐上部無脈者特因氣血之偶有滯耳病去則自復也按元氣者人身所稟天真本原之氣所謂通天者生之本是也六十六難曰臍下腎間動氣者人之生命也十二經之根本也故名曰原三焦者原氣之別使也金匱要略曰腠者三焦通會元真之處為血氣所注是則元者本原之謂也春秋繁露王道篇曰春秋何貴乎元而言之元者始也言本正也道王道也王者人之始也王正則元氣和順又重政篇曰春秋變一謂之元元猶原也其義以隨天地終始也故人唯有終始也而生不必應四時之變故元者為萬物之本揚雄解嘲曰天者含元氣白虎通曰地者元氣之所生萬物之祖也漢書律曆志曰大極元氣函三為一極中也元始也文選東都賦曰降煙熅調元氣又魯靈光殿賦曰包陰陽之變化含元氣之煙熅李善注春秋曆命序云元氣正則天地八卦孳後漢書李固傳曰北斗斟酌元氣運平四時王充論衡幸偶篇曰俱稟元氣或獨為人或為禽獸又無形篇曰人稟元氣於天各受壽夭之命以立長短之形蓋人之生也與天地參則所稟之氣其理一也內經是謂真氣又謂生氣者生之所資始而天所稟之氣也譬如二字本義謂當在人之有尺下此說是矣然脈經亦與經文同十五難曰經言春脈弦夏脈鉤秋脈毛冬脈石是王脈耶將病脈也然弦鉤毛石者四時之脈也春脈弦者肝東方木也萬物始生未有枝葉故其脈之來濡弱而長故曰弦夏脈鉤者心南方火也萬物之所盛垂枝布葉皆下曲如鉤故其脈之來疾去遲故曰鉤秋脈毛者肺西方金也萬物之所終草木華葉皆秋而落其枝獨在若毫毛也故其脈之來輕虛以浮故曰毛冬脈石者腎北方水也萬物之所藏也盛冬之時水凝如石故其脈之來沉濡而滑故曰石此四時之脈也滑此內經平人氣象玉機真藏論參錯其文而為篇也春脈弦者肝主筋應筋之象夏脈鉤者心主血脈應血脈來去之象秋脈毛者肺主皮毛冬脈石者腎主骨各應其象兼以時物之象取義也來疾去遲劉立之曰來者自骨肉之分而出於皮膚之際氣之升而上也去者自皮膚之際而還於骨肉之分氣之降而下也徐來疾者其來少急而徑去遲者其去少緩而弱此所謂下曲如鉤也按藏府之與五行各有所屬而春夏秋脈皆以木為喻者唯木為因時遷變也如有變奈何然春脈弦反者為病何謂反然其氣來實強是謂太過病在外氣來虛微是謂不及病在內氣來厭厭聶聶如循榆葉曰平益實而滑如循長竿曰病急而徑益強如新張弓弦曰死春脈微弦曰平弦多胃氣少曰病但弦無胃氣曰死春以胃氣為本呂實強者陽氣盛也少陽當微弱今更實強謂太過陽主表故今其病在外也厥陰之氣養於筋其脈弦今更虛微故曰不及陰處中故今其病在內也如循長竿謂弦多胃氣少也如新張弓弦謂但強無胃氣也按素問平人氣象論曰平肺脈來厭厭聶聶如落榆莢曰肺平次注浮薄而虛者也又曰平肝脈來耎弱招招如揭長竿末稍曰肝平與此段為異弟堅曰厭厭聶聶聖惠方作擫擫聶聶廣韻云擫於葉切葉動貌說文云聶木葉搖白也按白恐兒訛兒即貌省文從木聶聲爾雅曰欇虎櫐釋文曰欇郭音涉本又作聶並同爾雅曰榆白枌注枌榆先生葉卻著莢皮色白說文曰竿竹挺也從竹干聲王冰素問次注曰徑謂徑強急之甚也夏脈鉤反者為病何謂反然其氣來實強是謂太過病在外氣來虛微是謂不及病在內其脈來纍纍如環如循琅玕曰平來而益數如雞舉足者曰病前曲後居如操帶鉤曰死夏脈微鉤曰平鉤多胃氣少曰病但鉤無胃氣曰死夏以胃氣為本呂實強者太陽受氣盛也太陽浮散今反實強故曰太過也手少陰主血脈其氣尚平實今反見虛微故曰不及也心脈但當浮散不當數也雞舉足者諭其數也後居謂之後直如人革帶之鉤前曲後直也是謂但鉤無胃氣也丁操者執也如手執革帶前鉤曲無力也後居倨而不動徑有故曰死也按素問平人氣象論曰病脾脈來實而盈數如雞舉足曰脾病與此段為異說文曰環璧也肉好若一謂之環從玉睘聲琅玕似珠者琅從玉良聲玕從玉干聲禹貢雍州球琳琅玕素問次注曰如循琅玕言脈滿而盛微似珠形之中手琅玕珠之類也居不動也操執持也雞舉足謂如雞走之舉足也秋脈微毛反者為病何謂反然氣來實強是謂太過病在外氣來虛微是謂不及病在內其脈來藹藹如車蓋按之益大曰平不上不下如循雞羽曰病按之消索如風吹毛曰死秋脈微毛為平毛多胃氣少曰病但毛無胃氣曰死秋以胃氣為本聖惠方藹藹作靄靄本義消作蕭呂車蓋乃小車之蓋也輕浮藹藹然也按之益大有胃氣故曰平也丁不下不上如循雞羽者但當澀澀然故曰病也風吹毛者飄騰不定無歸之象故曰死也按藹藹輕盈浮大之義爾雅釋木曰賁藹注樹實繁茂菴藹也菴藹即藹藹之雙聲周禮考工記曰軫之方也以象地也蓋之圜也以象天也素問次注曰如循雞羽者謂中央堅而兩旁虛也如風吹毛者紛紛然也冬脈石反者為病何謂反然其氣來實強是謂太過病在外氣來虛微是謂不及病在內脈來上大下兌濡滑如雀之喙曰平啄啄連屬其中微曲曰病來如解索去如彈石曰死冬脈微石曰平石多胃氣少曰病但石無胃氣曰死冬以胃氣為本諸本喙訛作啄俗解作喙是音釋喙許穢切呂雀喙謂本大末兌也啄啄者不息故謂之連屬解索謂虛縵無根本也來遲去疾故曰彈石丁解索診之應手如脫解之索無力也按素問平人氣象論曰死脾脈來鋭堅如鳥之喙又曰平腎脈來喘喘纍纍如鉤按之而堅曰腎平病腎脈來如引葛按之益堅曰腎病又解索作奪索又曰喘喘連屬其中微曲為病心脈次注曲謂中手而偃曲也如彈石言促又堅也考啄啄據內經當作喘喘丁注謂啄啄如雀啄連連時止恐不為是蓋內經有盛喘喘數等語俱喻脈之數疾也胃者水穀之海也主稟四時故皆以胃氣為本是謂四時之變病死生之要會也脾者中州也其平和不可得見衰乃見耳來如雀之啄如水之下漏是脾之衰見也呂脾寄王四季故不言王言平和脈不見其衰病則見耳按素問次注曰水流屋漏言其至也屋漏謂時動覆住十六難曰脈有三部九候有陰陽有輕重有六十首一脈變為四時離聖久遠各自是其法何以別之滑謝氏曰此篇問三部九候以下共六件而本經並不答所問似有缺文今詳三部九候則十八難中第三章言之當屬此篇錯文在彼陰陽見四難輕重見五難一脈變為四時即十五難春弦夏鉤秋毛冬石也六十首按內經方盛衰篇曰聖人持診之道先後陰陽而持之奇恆之勢乃六十首王注謂奇恆六十首今世不存則失其傳者由來遠矣然是其病有內外證其病為之奈何然假令得肝脈其外證善潔面青善怒其內證齊左有動氣按之牢若痛其病四肢滿閉癃溲便難轉筋有是者肝也無是者非也呂外證者府之候膽者清淨之府故面青善潔其內證者肝之證滑得肝脈診得弦脈也肝為將軍之官故善怒善猶喜好也臍左肝之部也按之牢若痛謂其動氣按之堅牢而不移或痛也厥陰脈循陰器肝病故溲便難轉筋者肝主筋也此段答辭然與前問不相蒙當別有問辭也徐動氣真氣不能藏而發現於外也牢者氣結而堅痛者氣鬱而滯按善字滑解為得詩鄘風載馳章女子善懷亦各有行箋善猶多也漢書溝洫志曰引洛水至商顏下岸善崩注師古曰善崩言熹崩也經釋四肢滿為句是蓋筋急則覺四肢滿脹也諸家四肢滿閉為句丁讀為攣嚲之義並非癃補注本義作淋考癃音犁針切義與淋同史記孝景本紀索隱曰隆慮音林閭避殤帝諱改之據此癃字亦避諱作淋本草經內經皆用癃字其作淋者蓋後人所改素問奇病論曰有癃者一日數十溲此不足也次注癃小便不得也溲小便也一切經音義曰聲類云痳謂小便數而難出也溲字概稱大小便見於史倉公傳然此段閉癃溲便難唯言小便若開若淋澀虞注謂癃溲小府澀也便難大府所注艱也誤假令得心脈其外證面赤口乾喜笑其內證齊上有動氣按之牢若痛其病煩心心痛掌中熱而啘有是者心也無是者非也滑掌中手心主脈所過之處蓋真心不受邪受邪者手心主爾徐素問心在色為赤在聲為笑心氣通於舌故火上炎則干也按先子曰啘即噦字靈樞雜病篇曰噦以草刺鼻嚏嚏而已肘後方作卒啘不止可以證焉又靈樞口問篇曰人之噦者何氣使然岐伯曰谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相逆復出於胃故為噦說文曰噦氣牾也從口歲聲本義以噦為乾嘔非假令得脾脈其外證面黃善噫善思善味其內證當齊有動氣按之牢若痛其病腹脹滿食不消體重節痛怠惰嗜臥四肢不收有是者脾也無是者非也虞脾土也在變動為噫在志為思主甘受味故善味丁當齊有動氣者脾主中州也其病腹滿食不消體重節痛怠惰四肢不收即是胃也胃為水穀之海為土土靜故有此證滑靈樞口問篇曰噫者寒氣客於胃厥逆從下上散復出於胃故為噫經曰脾主四肢徐素問痿論曰陽明主束骨而利機關脾與胃合故亦主節按說文曰噫飽食息也從口意聲假令得肺脈其外證面白善嚏悲愁不樂欲哭有內證齊右有動氣按之牢若痛其病喘咳灑淅寒熱有是者肺也無是者非也虞肺主皮毛外感寒內合於肺故嚏也悲者肺之志也在聲為哭肺主氣外候皮毛虛則灑淅惡寒實則熱而閟故云寒熱徐素問刺禁論曰肺藏於右臍右肺之位也肺主氣氣逆則喘咳按靈樞口問篇曰人嚏者何氣使然岐伯云陽氣和利滿於心出於鼻故為嚏說文曰嚏悟解氣也從口疐聲詩云願言則嚏假令得腎脈其外證面黑喜恐缺其內證齊下有動氣按之牢若痛其病逆氣少腹急痛泄如下重足脛寒而逆有是者腎也無是者非也虞腎氣不足傷於衝脈故氣逆少陰之脈循少腹故少腹急痛也腎者胃之關今氣虛故為下重泄謂食畢思急圊通評虛實論曰氣逆者足寒也滑如讀為而徐素問腎在志為恐靈樞口問篇曰陰氣積於下陽氣未盡陽引而上陰引而下陰陽相引故數缺又云腎主為缺又經脈篇足少陰腎之脈循內踝之後別入跟中以上踹內故足脛寒也按說文曰缺張口氣悟也象氣從人上出之形十七難曰經言病或有死或有不治自愈或連年月不已其死生存亡可切脈而知之耶然可盡知也診病若閉目不欲見人者脈當得肝脈強急而長而反得肺脈浮短而澀者死也脈經盡作具診病作設病者強作弦楊強急猶弦急也滑此篇所問者三答云可盡知也止答病之死證余無所見當有關漏肝開竅於目閉目不欲見人肝病也肝病見肺脈金剋木也病若開目而渴心下牢者脈當得緊實而數反得沉濡而微者死也脈經濡作滑本義作澀並非丁心之病證今反見腎脈水來剋火故知死也虞陽病得陰脈故曰死也徐心主熱甚則開目而渴也病若吐血復鼽衄血者脈當沉細而反浮大而牢者死也滑脫血脈實相反也徐此又一義不以生克言所謂病虛脈實故死也靈樞玉版篇曰衄而不止脈大此三逆即此義也按說文曰鼽病寒鼻窒也從鼻九聲釋名曰鼻塞曰鼽鼽久也涕久不通遂至窒塞也說文又曰衄鼻出血也從血醜聲病若譫言妄語身當有熱脈當洪大而手足厥逆脈沉細而微者死也脈經而下有反字沉上又有反字楊按之遲但小謂之細滑陽病見陰脈相反也按楊上善太素經注曰譫語多言也病若大腹而泄者脈當微細而澀反緊大而滑者死也脈經反下有得字死下有此之謂三字滑泄而脈大相反也大腹腹脹也徐此亦病虛脈實也靈樞玉版篇曰腹鳴而滿四支清泄其脈大是二逆也十八難曰脈有三部部有四經手有太陰陽明足有太陽少陰為上下部何謂也然手太陰陽明金也足少陰太陽水也金生水水流下行而不能上故在下部也足厥陰少陽木也生手太陽少陰火火炎上行而不能下故為上部手心主少陽火生足太陰陽明土土主中宮故在中部也此皆五行子母更相生養者也楊手太陰肺脈也肺為諸藏上蓋其治在右方故在右手上部也手陽明大腸脈是肺之府故隨肺居上部焉足少陰腎脈腎為水肺之子水流趣於腎又最居於下故為右手下部也足太陽膀胱為腎之府故隨腎居下部焉經言脈有三部部有四經者謂惣兩手而言之也兩手各有三部部各有二經兩手上部合四也中下二部亦復如此三四十二則十二經也肺金居上而下生腎水故肺腎在左右手上下部也足厥陰肝脈也肝治在左方故為左手之下部足少陽膽者為肝之府故隨肝居下部也手太陽小腸脈為心之府故隨心居上部焉手心主胞絡脈也手少陽三焦脈也故合為左手中部足太陰脾脈也足陽明胃脈也故合為右手中部此經作如此分別若依脈經配三部又與此不同也徐此篇所論六經部位乃素問血氣形志篇所謂足太陽與少陰為表裡少陽與厥陰為表裡陽明與太陰為表裡是為足陰陽也手太陽與少陰為表裡少陽與心主為表裡陽明與太陰為表裡是為手陰陽也以此為據按詳經文唯說以三部配六經之義而非左右排位之謂也然其言曖昧難識姑舉楊注以解之是復掠取王氏脈經之說而為解者其實叵以確據矣脈有三部九候各何所主之然三部者寸關尺也九候者浮中沉也上部法天主胸以上至頭之有疾也中部法人主膈以下至齊之有疾也下部法地主齊以下至足之有疾也審而刺之者也本義無所字楊寸口陽也關中部也尺中陰也此三部各有浮中沉三候三三九候也故曰九浮為陽沉為陰中者胃氣也所謂自膈以上為上焦也自膈以下為中焦也自齊以下至足為下焦也謝此一節當是十六難中答辭錯簡在此而剩出脈有三部九候各何主之十字按楊注以後以此段為左右三部分配藏府之義然內經及難經未嘗有其說蓋出於脈經兩手六脈所主藏府陰陽逆順篇所引脈法贊文紀天錫集注極辨其碎義難據實為精當脈經又有分別三關境界脈候篇曰寸主射上焦出頭及皮毛竟手關主中焦腹及腰尺主射下焦少腹至足義與此段同刺字楊注為針刺丁注當作次字紀氏為刺候之義未知孰是人病有沉滯久積聚可切脈而知之耶然診在右脅有積氣得肺脈結脈結甚則積甚結微則氣微診不得肺脈而右脅有積氣者何也然肺脈雖不見右手脈當沉伏楊往來緩而時一止復來謂之結也脈結甚者是診脈之狀也結甚者此結訓積猶言脈結甚則積甚脈結微則積微其言稍隱也極重指著骨乃得故謂伏脈也滑此下問答亦未詳所屬或曰當是十七難中或連年月不已答辭也徐結為積聚之脈平人氣象論云結而橫有積矣沉伏亦積氣之脈右手統指三部言其外痼疾同法耶將異也然結者脈來去時一止無常數名曰結也伏者脈行筋下也浮者脈在肉上行也左右表裡法皆如此假令脈結伏者內無積聚脈浮結者外無痼疾有積聚脈不結伏有痼疾脈不浮結為脈不應病病不應脈是為死病也滑此承上文復問外之痼病與內之積聚法將同異結為積聚伏脈行筋下主裡浮行肉上主表所以異也前舉右脅為例故此云左右同法脈病不相應故為死病也徐人病以下至末與前文不類疑是五十二五十五五十六等難內錯文按痼即痼俗字說文曰痼久病也從疒古聲又通作固錮禮月令曰季冬之月行春令則國有固疾注生不充性有久疾也漢書賈誼傳曰失今不治必為錮疾十九難曰經言脈有逆順男女有常而反者何謂也然男子生於寅寅為木陽也女子生於申申為金陰也楊元氣起於子人之所生也男從子左行三十女從子右行二十俱至於巳為夫婦懷妊也古者男子三十女年二十然後行嫁娶法於此也十月而生男從巳至寅左行為十月故男行年起於丙寅女從巳右行至申為十月故女行年起於壬申所以男子生於寅女子生於申滑此推本生物之初而言男女陰陽也按脈有逆順言脈有男之所順女之所逆有女之所順男之所逆也男女所生之理虞注為男女天癸之數規楊氏之言反非淮南子泛論訓曰禮三十而娶注三十而娶者陰陽未分時俱生於子男從子數左行三十立於巳女從子數右行二十年亦立於巳合夫婦故聖人因是制禮使男三十而娶女二十而嫁其男子從巳數左行十得寅故人十月而生於寅故男子數從寅起女自巳數右行得申亦十月而生於申故女子數從申生也說文曰包象人褱妊巳在中象子未成形也元氣起於子子人所生也男左行三十女右行二十俱立於巳為夫婦褱妊於巳巳為子十月而生男起巳至寅女起巳至申故男年姑寅女年始申也是可以證楊說而經文實原古禮演男女嫁娶之義者可知矣又離騷經曰惟庚寅吾以降章句云寅為陽正故男始生而立於寅庚為陰正故女始生而立於庚是庚之與申雖不同其為義則一也故男脈在關上女脈在關下是以男子尺脈恆弱女子尺脈恆盛是其常也楊男子陽氣盛故尺脈弱女子陰氣盛故尺脈強此是其常性謝寅為木木生火又火生於寅而性炎上故男脈在關上申為金金生水又水生於申而性流下故女脈在關下反者男得女脈女得男脈也其為病何如然男得女脈為不足病在內左得之病則在左右得之病則在右隨脈言之也女得男脈為太過病在四肢左得之病則在左右得之病則在右隨脈言之此之謂也楊男得女脈為陰氣盛陰主內故病在內女得男脈為陽氣盛主四肢故病在四肢也二十難曰經言脈有伏匿伏匿於何藏而言伏匿耶然謂陰陽更相乘更相伏也脈居陰部而反陽脈見者為陽乘陰也脈雖時沉澀而短此謂陽中伏陰也脈居陽部而反陰脈見者為陰乘陽也脈雖時浮滑而長此謂陰中伏陽也楊陽乘陰尺中已浮滑而長又時時沉澀而短故曰陽中伏陰也寸關已沉短而澀澀而時時浮滑而長故曰陰中伏陽也丁其部非獨言寸為陽尺為陰也若以前後言之即寸為陽部尺為陰部若以上下言之曰肌肉上為陽部肌肉下為陰部滑居猶在也當也乘猶乘車之乘出於其上也伏猶伏兵之伏隱於其中也匿藏也徐引經言無考伏匿謂不見於本位反藏於他部而見其脈也重陽者狂重陰者癲脫陽者見鬼脫陰者目盲虞寸口曰陽又今重見陽脈三倍以上故曰重陽其病狂惑自高賢智登高而歌棄衣而走罵詈不避親疏故曰狂尺中曰陰而尺脈重見陰故曰重陰其為病也名曰癲疾謂僵仆於地閉目不醒陰極陽復良久卻醒故曰癲也今天吊之類是也徐此又因陰陽之伏匿而極言之重陰重陽言不止伏匿陰皆變為陽陽皆變為陰也脫陽脫陰者此又因重陽重陰而及之鬼屬陰陽既脫則純乎陰故見鬼目得血而能視陰既脫則血不營於目故曰盲此則重陰重陽之反也按本義為五十九難之錯文然脈經文亦如是則徐說為得二十一難曰經言人形病脈不病曰生脈病形不病曰死何謂也然人形病脈不病非有不病者也謂息數不應脈數也此大法周形體之中覺見憔悴精神昏憒食不忺美而脈得四時之從無過不及之偏是人病脈不病也形體安和而脈息乍小乍大或至或損弦緊浮滑沉澀不一殘賊沖和之氣是皆脈息不與形相應乃脈病人不病也仲景云人病脈不病名曰內虛以無穀氣神雖困無苦脈病人不病名曰行尸以無王氣卒眩僕不識人短命則死謝按本經答文詞意不屬似有脫誤二十二難曰經言脈有是動有所生病一脈輒變為二病者何也然經言是動者氣也所生病者血也邪在氣氣為是動邪在血血為所生病氣主詬之血主濡之氣留而不行者為氣先病也血壅而不濡者為血後病也故先為是動後所生病也虞氣病傳血此乃一脈變為二病脈動反常邪在氣氣受邪傳之與血故血為所生病詬之氣流行之貌也濡者濡潤之貌言人身所稟者氣血也氣血通行沮潤人身其為病也若此丁氣主詬之詬詬謂吹噓往來之象人一身經脈通行氣血或居一經脈中氣留不行故血壅不濡其氣先病名曰是動血壅不濡後病名曰所生此是一脈輒變為二病也滑氣主詬之謂氣煦噓然來薰蒸於皮膚分肉也血主濡之謂血濡潤筋骨滑利關節榮養藏府也此脈字非尺寸之脈乃十二經隧之脈也此謂十二經隧之脈每脈中輒有二病者蓋以有在氣在血之分也徐此亦非經之全文乃約經語以成文者也是動所生病見靈樞經脈篇是動諸病乃本經之病所生之病則以類推而旁及他經者經文並無氣血分屬之說按自一難至此論脈是為第一篇二十三難曰手足三陰三陽脈之度數可曉以不然手三陽之脈從手至頭長五尺五六合三丈手三陰之脈從手至胸中長三尺五寸三六一丈八尺五六三尺合二丈一尺足三陽之脈從足至頭長八尺六八四丈八尺足三陰之脈從足至胸長六尺五寸六六三丈六尺五六三尺合三丈九尺人兩足蹻脈從足至目長七尺五寸二七一丈四尺二五一尺合一丈五尺督脈任脈各長四尺五寸二四八尺二五一尺合九尺凡脈長一十六丈二尺此所謂十二經脈長短之數也楊一手有三陽兩手合為六陽故曰五六合三丈也兩手各有三陰合為六陰故曰三六一丈八尺兩足各有三陽故曰六八四丈八尺按此脈度數七尺五寸中人之形而云長八尺理則難解然足之六陽從足指而向上行由其紆曲故曰八尺也兩足各有三陰故曰六六三丈六尺也按足太陰少陰皆至舌下足厥陰至於頂上今言至胸中者蓋據其相接之次也督脈起於脊𦟘上於頭下於面至口齒縫計則不止長四尺五寸今言四尺五寸者當取上極於風府而言之也虞人有陰蹻陽蹻二脈兩足合四脈陽蹻者起於跟中循外踝上行入風池陰蹻者亦起於跟中乃是足少陰之別絡也自然骨之後上內踝之上上出人迎之前入頄內廉屬目內眥合太陽脈長七尺五寸兩行合一丈五尺准此推之至目者是兩足陰蹻脈也滑此靈樞草七篇全文三陰三陽靈樞皆作六陰六陽義尤明白徐靈樞脈度篇論蹻脈起止專指陰蹻言而不及陽蹻則其長短之數乃陰蹻之數也按自二十三難至二十九難論經絡是為第二篇經脈十二絡脈十五何始何窮也然經脈者行血氣通陰陽以榮於身者也其始從中焦注手太陰陽明陽明注足陽明太陰太陰注手少陰太陽太陽注足太陽少陰少陰注手心主少陽少陽注足少陽厥陰厥陰復還注手太陰別絡十五皆因其原如環無端轉相溉灌朝於寸口人迎以處百病而決死生也滑因者隨也原者如也朝猶朝會之朝以用也因上文經脈之尺度而推言經絡之行度也直行者謂之經旁出者謂之絡十二經有十二絡兼陽絡陰絡脾之大絡為十五絡也謝氏云始從中焦者蓋謂飲食入口藏於胃其精微之化注手太陰陽明以次相傳至足厥陰厥陰復還注手太陰也寸口人迎古法以俠喉兩旁動脈為人迎至晉王叔和直以左手關前一分為人迎右手關前一分為氣口後世宗之愚謂昔人所以取人迎氣口者蓋人迎為足陽明胃經受穀氣而養五藏者也氣口為手太陰肺經朝百脈而平權衡者也徐脈所注為原靈樞九針十二原篇云原者五藏之所以稟三百六十五節氣味也按靈樞經脈篇曰經脈者所以能決死生處百病調虛實不可不通經釋以處為揆度未妥蓋處者處分之謂也大戴禮諸侯遷廟篇曰聽其聲處其氣考其所為觀其所由義與此同榮古與營通即營周之義也經曰明知終始陰陽定矣何謂也然終始者脈之紀也寸口人迎陰陽之氣通於朝使如環無端故曰始也終者三陰三陽之脈絶絶則死死各有形故曰終也滑謝氏曰靈樞第九篇云凡刺之道畢於終始明知終始五藏為紀陰陽定矣又曰不病者脈口人迎應四時也少氣者脈口人迎俱少而不稱尺寸也此一節因上文寸口人迎處百病決死生而推言之謂欲曉知終始於陰陽為能定之蓋以陽經取決於人迎陰經取決於氣口也朝使者朝謂氣血如水潮應時而灌溉使謂陰陽相為用也始如生物之始終如生物之窮欲知生死脈以候之陰陽之氣通於朝使如環無端則不病一或不相朝使則病矣況三陰三陽之脈絶乎絶必死矣其死之形狀則具如下篇按經釋曰靈樞終始篇云終始者經脈為紀此終始蓋指十二經之所起止也非謂氣行為始脈絶為終也其終始篇篇末亦載十二經脈絶病形豈因此遂誤以終始之終為即此終耶二十四難曰手足三陰三陽氣已絶何以為候可知其吉凶不然足少陰氣絶即骨枯少陰者冬脈也伏行而溫於骨髓故骨髓不溫即肉不著骨骨肉不相親即肉濡而卻肉濡而卻故齒長而枯發無潤澤者骨先死戊日篤巳日死素問診要經終論新校正曰詳王注云骨不耎骨硬難經及甲乙經云骨不濡則肉弗能著當作骨不濡靈樞經脈篇亦作濡本義澤下長有無潤澤三字按下文例骨髓不溫當作脈不溫楊足少陰腎脈也腎主冬故云冬脈也腎主內榮骨髓故云伏行而溫於骨髓也卻結縮也謂齒齦之肉結縮而故齒漸長而枯燥色不澤也腎為津液之主今無津液故使發不潤焉戊己土也腎水也土剋水故云戊日篤己日死也滑此下六節與靈樞第十篇文皆大同小異濡讀為軟徐卻退縮也按溫即溫養之謂濡古軟字見於素問玉機真藏論新校正卻楊為結縮義與軟字相乖足太陰氣絶則脈不榮其口唇口唇者肌肉之本也脈不榮則肌肉不滑澤肌肉不滑澤則肉滿肉滿則唇反唇反則肉先死甲日篤乙日死滑脾其華在唇四白其充在肌脾絶則肉滿唇反也肉滿謂肌肉不滑澤而緊急䐜膹也足厥陰氣絶即筋縮引卵與舌厥陰者肝脈也肝者筋之合也筋者聚於陰器而絡於舌本故脈不營則筋縮急筋縮急即引卵與舌故舌卷卵縮此筋先死庚日篤辛日死舌厥之間舊剩卷字據甲乙經刪按素問熱論曰厥陰脈循陰器而絡於肝次注凡虛中而受物者皆謂之器其於體外則謂陰囊其於身中所司則謂膀胱矣手太陰氣絶即皮毛焦太陰者肺也行氣溫於皮毛者也氣弗榮則皮毛焦皮毛焦則津液去津液去即皮節傷皮節傷則皮枯毛折毛折者則毛先死丙日篤丁日死滑肺者氣之本其華在毛其充在皮肺絶則皮毛焦而津液去皮節傷以諸液皆會於節也手少陰氣絶則脈不通少陰者心脈也心者脈之合也脈不通則血不流血不流則色澤去故面黑如梨此血先死壬日篤癸日死舊脫少陰者心脈也心者脈之合也十二字今據脈經所引靈樞補之本義甲乙經梨作黧非楊經云手三陰今此推釋太陰少陰而心主一經不言之何也然心主者心包絡之脈也少陰者心脈也二經同候於心故言少陰絶則心主亦絶其診既同故不別解也本經云面黑如漆柴此云如梨漆柴者恆山苗也其草色黃黑無潤澤故以為喻梨者人所食之果也亦取其黃黑焉言人即無血則色黃黑似此二物無光華也按方言曰老燕代之北鄙曰梨郭璞注言面色如凍梨爾雅正義孫炎云耇面如凍梨色如浮垢是楊注所本丁注曰梨字當作黧誤考諸本草恆山苗未載漆柴名不知何據三陰氣俱絶者則目眩轉目瞑目瞑者為失志失志者則志先死死即目瞑也楊三陰者是手足三陰脈也此五藏之脈也五藏者人之根本也故三陰俱絶則目瞑瞑閉也虞人之五志皆屬於陰今三陰已絶五藏皆失其志故無喜怒憂思恐五志俱亡故曰失志也按眩轉之眩當是系訛蓋眩或作玄因訛係為玄再轉從目也靈樞經脈篇曰五陰氣俱絶則目系轉轉則目運又大惑論曰五藏六府之精氣皆上注於目又曰腦轉則引目系急目系急則目眩以轉矣再按辨正條例曰注義目眩為失志今從之補注作目瞑據此似舊作目系轉目眩六陽氣俱絶者則陰與陽相離陰陽相離則腠理泄絶汗乃出大如貫珠轉出不流即氣先死旦占夕死夕占旦死丁六陽者是手足三陽也楊陰與陽相離者陰陽隔絶不相朝使也腠理泄者陽氣已下毛孔皆開所以然也絶汗者乃汗出如珠言身體汗出著肉如綴珠而不流散故曰貫珠也按占亦診候之義莊子人間世曰匠石覺而診其夢釋文司馬彪云診占夢也二十五難曰有十二經五藏六府十一耳其一經者何等經也然一經者手少陰與心主別脈也心主與三焦為表裡俱有名而無形故言經有十二也楊手少陰真心脈也手心主心包絡脈也二脈俱是心脈而少陰與少陽合心主與三焦脈合三焦者有位而無形心主有名而無藏故二經為表裡也五藏六府各一脈為十一脈心有兩脈合成十二經焉據此而言六府亦止五府耳二十六難曰經有十二絡有十五餘三絡者是何等絡也然有陽絡有陰絡有脾之大絡陽絡者陽蹻之絡也陰絡者陰蹻之絡也有絡有十五焉楊十二經各有一絡為十二絡耳今云十五絡者有陰陽之二經脾之大絡合為十五絡也按陰陽二蹻見於二十八難靈樞經脈篇曰脾之大絡名曰大包出淵腋下三寸布胸脅二十七難曰脈有奇經八脈者不拘於十二經何謂也然有陽維有陰維有陽蹻有陰蹻有沖有督有任有帶之脈凡此八脈者皆不拘於經故曰奇經八脈也經有十二絡有十五凡二十七氣相隨上下何獨不拘於經也然聖人圖設溝渠通利水道以備不然天雨降下溝渠溢滿當此之時雱霈妄行聖人不能復圖也此絡脈滿溢諸經不能復拘也脈經不然作不虞當此之時在於聖人上虞奇音基也奇斜也零也不偶之義謂此八脈不繫正經陰陽無表裡配合別道奇行故曰奇經也所以經言八脈不拘於經以此可驗矣楊氏言奇異之義非也滑奇經者絡脈之滿溢而為之者歟或曰此絡脈三字越人正指奇經而言也既不拘於經直謂之絡脈亦可也此篇兩節舉八脈之名及所以為奇經之義徐言血脈充盛十二經不足以容之則溢出而為奇經故奇經為十二經之別脈也按說文曰圖畫計難也從口從啚啚難意也徐鍇云規畫之也溝水瀆廣四尺深四尺從水勾聲渠水所居從水矩省聲滂滂沛也從水旁聲徐鉉等云今俗作雱霈非是二十八難曰其奇經八脈者既不拘於十二經皆何起何繼也然督脈者起於下極之俞並於脊裡上至風府入屬於腦脈經繼作系呂督脈者陽脈之海也楊下極者長強也徐繼續也按靈樞經脈篇曰督脈之別名曰長強挾膂上項散頭上下當肩胛左右別走太陽入貫膂脈經曰衝脈者陰脈之海也督脈者陽脈之海也又其敘八脈與本經不同始載二維次蹻脈次衝脈次督脈次任脈次帶脈也照之下文敘奇經之病其次相同且其所記任沖二脈之起行亦與本經不同反合於下文呂注甲乙經屬於腦下又云上巔循額至鼻柱陽脈之海也楊注以督為都綱之義非先子曰督古與裻通其脈循脊上行故以背縫名之晉語曰衣之偏裻之衣注裻在中左右異故云偏莊子養生主論曰緣督以為經釋文李頤云督中也說文曰裻新衣聲一曰背縫從衣叔聲甲乙經曰風府在項上一寸大筋內長強在脊骶端任脈者起於中極之下以上毛際循腹裡上關元至咽喉甲乙經作中極之上脈經作任脈者起於胞門子戶夾臍上行至胸中注一云任脈者起於中極之下以上毛際循腹裡至關元至咽喉丁中極者穴名也在齊下四寸其中極之下者曲骨穴也按先子曰任與衽通其循腹裡上行猶衽之在於腹前也說文曰衽衣襟也從衣壬聲又曰襟交衽也從衣金聲楊注任者妊也此為人之生養之本誤甲乙經曰關元在臍下三寸王冰素問骨空論注曰言中極之下者言從少腹之內上行而外出於毛際而上非謂本起於此也何以言之針經云衝脈者十二經之海與少陰之絡起於腎下出於氣街又云衝脈任脈者皆起於胞中上循脊裡為經絡之海由此言之則任脈衝脈從少腹之內上行至中極之下氣街之內明矣衝脈者起於氣衝並足陽明之經夾齊上行至胸中而散也脈經衝脈者起於關元循腹裡直上至咽喉中注一云衝脈者起於氣衝並陽明之經夾臍上行至胸中而散楊經云衝脈者十二經之海也如此則不獨為陰脈之海恐呂氏誤矣沖者通也言此脈下至於足上至於頭通受十二經之氣血故曰沖焉此奇經之三脈也虞素問云衝脈起於氣街難經云起於氣衝又針經穴中兩存其名沖街之義也素問云並足少陰之經難經言並足陽明之經況少陰之經夾齊左右各五分陽明之經夾齊左右各二寸氣衝又是陽明脈氣所發如此推之則衝脈自氣衝起在陽明少陰二經之內其理明矣大體督脈任脈衝脈此三脈皆自會陰穴會合而起二脈分為三岐行於陰陽部分不同故名各異也按靈樞逆順肥瘦篇曰夫衝脈者五藏六府之海也五藏六府皆稟焉楊注規呂稱陰脈之海是而其以沖為通未盡說文曰沖通道也從行童聲春秋云及沖以戈擊之又曰街四通道也從行圭聲虞注沖街之義此說為妥蓋此脈為十二經之所注猶四通之路也甲乙經曰氣衝在歸來下鼠溪上一寸動脈應手帶脈者起於季脅回身一周脈經脅作肋楊帶之為言束也言總束諸脈使得調柔也季脅在肋下下接於髖骨之間是也回繞也繞身一周猶如束帶按說文曰帶紳也男子鞶革婦人鞶絲象系佩之形佩必有巾從巾陽蹻脈者起於跟中循外踝上行入風池陰蹻脈者亦起於跟中循內踝上行至咽喉交貫衝脈甲乙經至作入丁陽蹻脈起於跟中循外踝者中衝穴也上入風池穴者頂後髮際陷中是奇經之五脈也陰蹻脈亦起跟中循內踝者照海穴也上行至咽喉交貫衝脈其又至目下承泣穴是陰蹻脈始終也是奇經之六脈也按先子曰蹻與屩通史記孟嘗君傳曰馮馭聞孟嘗君好客躡屩而見之索隱屩音腳字亦作蹻又虞卿傳曰躡蹻擔簦徐廣注蹻草履也蓋蹻脈起於跟中故義取於此或曰蹻即繑之義說文曰繑褲紐也從糸喬聲褲脛衣也從糸誇聲此說亦通楊注蹻捷疾也是人行走之機要動足之所由誤矣甲乙經曰風池在顳顬後髮際陷者中陽維陰維者維絡於身溢畜不能環流灌溉諸經者也故陽維起於諸陽會也陰維起於諸陰交也比於聖人圖設溝渠滿溢流於深湖故聖人不能拘通也而人脈隆盛入於八脈而不環周故十二經亦不能拘之其受邪氣畜則腫熱砭射之也脈經陽維起於諸陽會也二句在於陽維陰維者上無故字又無比於以下五十三字作此八者不繫於十二經故曰奇經八脈者也十八字甲乙經無諸經者也四字經釋灌溉作灌溢楊維者維持之義也此脈為諸脈之綱維故曰維脈也此有陰陽二脈為奇經八脈也虞十二經隆盛入於八脈而不環周邪在八脈腫熱畜積故以砭石射刺之故曰砭射之也紀陽維者維絡於陽之脈陰維者維絡於陰之脈所以陰陽能相維者經血滿足通達四旁能維絡於諸經也徐按二維之脈經無明文其起止蓋不可考不還周言不復歸於十二經也按素問刺腰痛論曰陽維之脈令人腰痛痛上怫然腫刺陽維之脈脈與太陽合腨下間去地一尺所次注太陽所生與正經並行而上至腨下復與太陽合而上也又曰飛陽之脈令人腰痛痛上怫怫然甚則悲以恐次注是陰維之脈也又曰刺飛陽之脈在內踝上五寸少陰之前與陰維之會次注陰維之會以三脈在此穴位也是經文二維之稱他無所見而其所會之穴見於甲乙經說文曰湖大陂也從水胡聲揚州浸有五湖浸川澤所仰以灌溉也拘通言不能拘止其所流通也本義曰溢畜不能環流灌溉諸經者也十二字當在十二經亦不能拘之之下則於此無所間而於彼得相從矣經釋曰維絡於身之下必有缺文後人誤以此二句移入此處故難通也考脈經甲乙經並與經文同則滑徐說難以信據而脈經以二經所起二句冠於陽維陰維者上殊覺文順本義又曰其受邪氣畜云十二字謝氏以為於本文上下當有缺文然脈經無此疑衍文也或云當在三十七難關格不得盡其命而死矣之下因邪在六府而言也此說似有理然據虞注其義亦鬯經釋曰奇經之脈不能還周故邪氣無從而出惟以砭石以射之則邪氣因血以泄病乃已也此說最為妥善二十九難曰奇經之為病何如然陽維維於陽陰維維於陰陰陽不能自相維則悵然失志溶溶不能自收持陽維為病苦寒熱陰維為病苦心痛陽維為病云十四字舊在於帶之為病後今據脈經謝注本義移於此脈經溶溶作容容甲乙經則悵然云十二字作為病腰腹縱容如囊水之狀注一云腹滿腰溶溶如坐水中狀呂悵然者其人驚驚即維脈緩故令人身不能收持驚則失志善忘恍惚也陽為衛故寒熱陰為榮榮為血血者心故心痛也丁溶溶者緩慢所以不能收持也滑溶溶無力貌徐溶溶浮蕩之貌按說文曰溶水盛也從水容聲是與經旨不符故舉三說說文又曰悵望恨也從心長聲陰蹻為病陽緩而陰急陽蹻為病陰緩而陽急滑兩蹻脈病在陽則陽結急在陰則陰結急受病者急不病者自和緩也按內經載八脈病證經釋詳舉之今不贅沖之為病逆氣而裡急督之為病脊強而厥任之為病其內苦結男子為七疝女子為瘕聚帶之為病腹滿腰溶溶若坐水中此奇經八脈之為病也呂衝脈從關元上至咽喉故其為病逆氣而裡急督脈在脊病則其脈急故令其脊強也任脈起於胞門子戶故其脈結為七疝瘕聚之病帶脈者回帶人之身體病則其腹緩故令腰溶溶也丁逆氣腹逆也裡急腹痛也虞瘕者謂假於物形也徐溶溶如坐水中寬慢不收而畏寒也按諸病源候論虛勞裡急候曰虛勞則腎氣不足傷於衝脈衝脈為陰脈之海起於關元關元穴在臍下隨腹直上至咽喉勞傷內損故腹裡拘急也七疝虞注謂厥疝盤疝寒疝症疝附疝狼疝氣疝也此稱諸病源候論所載而內經有五藏風疝及狐疝㿉疝之七名未知此所謂七疝否自二十三難至此論經絡是為第二篇黃帝八十一難經疏證卷下三十難曰榮氣之行常與衛氣相隨不然經言人受氣於谷谷入於胃乃傳於五藏六府五藏六府皆受於氣其清者為榮濁者為衛榮行脈中衛行脈外榮周不息五十而復大會陰陽相貫如環之無端故知榮衛相隨也楊衛者護也此是人之慓悍之氣行於經脈之外晝行於身夜行於藏衛護人身故曰衛氣凡人陰陽二氣皆會於頭手足流轉無窮故曰如環之無端也滑此篇與靈樞第十八篇岐伯之言同但谷入於胃乃傳與五藏六府五藏六府皆受於氣靈樞作谷入於胃以傳與肺五藏六府皆以受氣為少殊爾皆受於氣之氣指水穀之氣而言也夫以用而言則清氣為榮者濁中之清者也濁氣為衛者清中之濁者也以體而言則清之用不離乎濁之體濁之用不離乎清之體故謂清氣為榮濁氣為衛亦可也謂榮濁衛清亦可也紀氏亦云素問榮者水穀之精氣則清衛者水穀之悍氣則濁精氣入於脈中則濁悍氣行於脈外則清或問三十二難云血為榮氣為衛此則榮衛皆以氣言者何也曰經云榮者水穀之精氣衛者水穀之悍氣又云清氣為榮濁氣為衛蓋統而言之則榮衛皆水穀之氣所為故悉以氣言可也析而言之則榮為血而衛為氣固自有分是故榮行脈中衛行脈外猶水澤之於川澮風雲之於大虛也按自三十難至四十七難論藏府是為第三篇榮營同環周之義也靈樞有五十營篇釋人氣通行之數又營氣篇曰營氣之道內谷為寶谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧常營無已終而復始又營衛生會篇及此段有榮周不息之語其義並同而查說文曰營市居也從宮熒省聲據此與環周之義不葉蓋營古讀如環韓非子五蠹篇曰蒼頡之作書也自環者謂之私背私者謂之公說文引韓非作自營為某背某為公漢書地理志曰臨菑名營丘故齊詩云子之營遭我呼嶩之間兮顏師古注齊國風營詩之辭也毛詩作還齊詩作營是其音通則義相藉者營衛之營亦與環同義靈樞脈度篇曰蹻脈者合於太陽陽蹻而上行氣並相還則為濡目氣不榮則目不合是還與環通榮互用則又可以證焉楊注榮者榮華營者經營並乖經旨說文曰衛宿衛也從韋從幣從行行列衛也夫氣之在外為護謂之衛在內周流謂之營素問痹論曰榮者水穀之精氣也和調於五藏灑陳於六府乃能入於脈也故循脈上下貫五藏絡六府也衛者水穀之悍氣也其氣慓疾滑利不能入於脈也故循皮膚之中分肉之間熏於肓膜散於胸腹虞注有清濁誤寫之說不可從焉三十一難曰三焦者何稟何生何始何終其治常在何許可曉以不然三焦者水穀之道路氣之所終始也上焦者在心下下膈在胃上口主內而不出其治在膻中玉堂下一寸六分直兩乳間陷者是中焦者在胃中脘不上不下主腐熟水穀其治在齊傍下焦者當膀胱上口主分別清濁主出而不內以傳導也其治在齊下一寸故名曰三焦其府在氣街一本曰沖楊自膈以上名曰上焦主出陽氣溫於皮膚分肉之間若霧露之溉焉胃上口穴在鳩尾下二寸五分也自齊以上名曰中焦變化水穀之味生血以營五藏六府及於身體中脘在鳩尾下四寸也自齊以下名曰下焦齊下一寸陰交穴也主通利溲便以時下而傳故曰出而不內也氣街者氣之道路也三焦既是行氣之主故云府在氣街街衢也衢者四達之道焉一本曰沖此非扁鵲之語蓋呂氏再録之言別本有此言於義不可用也虞中焦其治在齊傍左右各一寸乃足陽明胃脈所發夾齊乃天樞穴也中焦主脾胃故治在此經中故曰齊傍也三焦其府在氣街針經本名氣衝沖者通與四達之義不殊兩存之可也紀三焦者稟原氣以資始合胃氣以資生上達胸中而為用往來通貫宣布無窮造化出內作水穀之道路為氣之所終始也靈樞經云上焦如霧中焦如漚下焦如瀆且如上焦者其氣自下而上散於胸中分布薰蒸於皮膚腠理在胃上口主內物而不令出中焦者其治在臍旁其用在胃中脘中脘者乃十二經所起所會陰陽口完之處故曰脘也素問云三焦者為決瀆之官其府在氣街者乃原氣所藏之處也夫三焦者焦字從火從隹乃火之臰物也火之性自下而上今三焦始於原氣用於中脘散於膻中亦如火自下而上也故素問云飲入於胃遊溢精氣上輸於脾此指中焦也脾胃散精上歸於肺此指上焦也通調水道下輸膀胱此指下焦也然脾肺膀胱既為藏府而又謂三焦人以是知之蓋內有所蘊則曰玄府氣達於外則曰三焦名之為焦者皆得火而發也如此則見三焦上下為水穀之道路作氣之終始也證義云人受水穀皆納於胃穀氣從胃而納於三焦三焦始傳於肺而遍於十二經則三焦之府在胃中明矣是不在氣街也天錫言三焦為原氣之別使主發用氣街之氣合水穀之氣而達於四旁通十二經絡是府在氣街也明矣證義之言不合本經之意滑治猶司也猶郡縣治之治謂三焦治所也徐膀胱上口闌門也清者入於膀胱而為溺濁者入於大腸而為滓穢府猶舍藏聚之義也按白虎通曰三焦者包絡府也水穀之道路氣之所終始也故上焦若竅中焦若編下焦若瀆此段經文原於靈樞營衛生會篇而與素問六節藏象論靈樞本藏篇所言有名有狀之三焦素問靈蘭祕典論靈樞本輸篇所言專指下焦氣化之三焦靈樞經脈篇三十八難所言手少陽三焦經脈氣所行之三焦固自不同蓋所謂有名無狀者是也甲乙經曰玉堂一名玉英在紫宮下一寸六分陷者中任脈氣所發膻中一名元兒在玉堂下一寸六分陷者中任脈氣所發說文曰脘胃府也從肉完聲讀若患前段舉五藏六府稟水穀榮衛之氣而相資養為論藏府之首條因及三焦之氣論其發用之理以次之也本義以其府在氣街句為衍非紀注辨之明晰三十二難曰五藏俱等而心肺獨在膈上者何也然心者血肺者氣血為榮氣為衛相隨上下謂之榮衛通行經絡營周於外故令心肺在膈上也五行大義引八十一問作五藏俱等心肺獨在鬲上何對曰心主氣肺主血血行脈中氣行脈外相隨上下故曰營衛故令心肺在膈上也滑心榮肺衛通行經絡營周於外猶天道之運於上也鬲者隔也凡人心下有鬲膜與脊脅周回相著所以遮隔濁氣不使上熏於心肺也徐素問五藏生成論云諸血者皆屬於心諸氣者皆屬於肺蓋營行脈中故血為營衛行脈外故氣為衛三十三難曰肝青象木肺白象金肝得水而沉木得水而浮肺得水而浮金得水而沉其意何也然肝者非為純木也乙角也庚之柔大言陰與陽小言夫與婦釋其微陽而吸其微陰之氣其意樂金又行陰道多故令得水而沉也肺者非為純金也辛商也丙之柔大言陰與陽小言夫與婦釋其微陰婚而就火其意樂火又行陽道多故令肺得水而浮也肺熟而復沉肝熟而復浮者何也故知辛當歸庚乙當歸甲也滑紀氏云肝為陰中之陽陰性尚多不隨於木故得水而沉也肺為陽中之陰陽性尚多不隨於金故得水而浮也此乃言其大者耳若言其小則乙庚丙辛夫婦之道也及其熟而沉浮反者各歸所屈見其本性故也陳氏云肝屬甲乙木應角音而重濁析而言之則甲為木之陽乙為木之陰合而言之則皆陽也以其屬少陽而位於人身之陰分故為陰中之陽夫陽者必合陰甲乙之陰陽本自為配合而乙與庚通剛柔之道乙乃釋甲之微陽而反樂金故吸受庚金微陰之氣為之夫婦木之性本浮以其受金之氣而居陰道故得水而沉也及熟之則所受金之氣去乙復歸之甲而木之本體自然還浮也肺屬庚辛金應商音而輕清析而言之則庚為金之陽辛為金之陰合而言之則皆陰也以其屬太陰而位於人身之陽分故為陽中之陰夫陰者必合陽庚辛之陰陽本自為配合而辛與丙通剛柔之道辛乃合庚之微陰而反樂夫火故就丙火之陽為之夫婦金之性本沉以其受火之氣炎上而居陽道故得水而浮也及熟之則所受火之氣乃去辛復歸之庚而金之本體自然還沉也愚謂肝為陽陰中之陽也陰性尚多故曰微陽其居在下行陰道也肺為陰陽中之陰也陽性尚多故曰微陰其居在上行陽道也熟則無所樂而反其本矣何也物熟而相交之氣散也按白虎通曰木所以浮金所以沉何子生於母之義肝所以沉肺所以浮何有知者尊其母也又五行大義引白虎通曰甲木畏金以乙妻庚受庚之化木法其本直甲故浮肝法其化直乙故沉庚金畏火以辛妻丙受丙之化金法其本直庚故沉肺法其化直辛故浮今本白虎通失載三十四難曰五藏各有聲色臭味可曉知以不然十變言肝色青其臭臊其味酸其聲呼其液泣心色赤其臭焦其味苦其聲言其液汗脾色黃其臭香其味甘其聲歌其液涎肺色白其臭腥其味辛其聲哭其液涕腎色黑其臭腐其味鹹其聲呻其液唾是五藏聲色臭味也滑此五藏之用也聲色臭味下缺液字肝色青臭臊木化也呼出木也味酸曲直作酸也液泣通乎目也心色赤臭焦火化也言陽火也味苦炎上作苦也液汗心主血汗為血之屬也脾色黃臭香土化也歌緩土也一云脾神好樂故其聲主歌味甘稼穡作甘也液涎通於口也肺色白臭腥金化也哭慘金也味辛從革作辛也液涕通乎鼻也腎色黑臭腐水化也呻吟誦也象水之聲味鹹潤下作咸也液唾水之屬也四明陳氏云腎位遠非伸之則氣不得及於息故聲之呻者自腎出也然肺主聲肝主色心主臭脾主味腎主液五藏錯綜互相有之徐此又本五行而言也十變未詳五藏之聲靈九針篇素宣明五氣篇俱云心噫肺咳肝語脾吞腎缺而此則為呼言歌哭呻則本之素陰陽應象大論蓋彼以病之所發言此以情之所發言其理一也按說文曰臊豕膏臭也從肉噪聲無聲出涕曰泣從水立聲次慕欲口液也從缺從水玉篇曰次或作涎又說文曰涕泣也從水弟聲洟鼻液也從水夷聲據此此段涕字似當作洟然素問宣明五氣篇曰五藏化液心為汗肺為涕肝為淚脾為涎腎為唾又解精微論曰髓者骨之充也故腦滲為涕又曰涕之與泣者譬如人之兄弟急則但死生則俱生是皆以涕為鼻液則未必可改作也五藏有七神各何所藏耶然藏者人之神氣所舍藏也肝藏魂肺藏魄心藏神脾藏意與智腎藏精與志也楊肝心肺各一神脾腎各二神五藏合有七神按靈樞本神篇曰生之來謂之精兩精相搏謂之神隨神往來者謂之魂並精而出入者謂之魄所以任物者謂之心心有所憶謂之意意之所存謂之志因慮而處物謂之智說文魂陽氣也從鬼云聲魄陰神也從鬼白聲昭公七年左傳曰子産云人生始化白魄既生魄陽曰魂用物精多則魂魄強是以有精爽至於神明又二十五年左傳曰樂祁云心之精爽是謂魂魄注魄形也陽神明也正義云初人之生也始變化為形形之神者名之曰魂魂魄神靈之名附形之靈為魄附氣之神為魂也附形之靈者謂初生之時耳目心識手足運動啼呼為聲此則魄之靈也附氣之神者謂精神性識漸有所知此則附氣之神也五行大義曰老子經及素問云心藏神者神以神明照口為義言心能明瞭萬事神是身之君象火腎藏精者精靈睿知為稱亦是精智氣腎水智巧故精藏焉魂藏肝魄藏肺者魂既屬天天為陽陽主善尚左居肝在東方木位魄既屬地地氣為陰陰主惡尚右故居肺在西方金位三十五難曰五藏各有所府皆相近而心肺獨去大腸小腸遠者何謂也經言心榮肺衛通行陽氣故居在上大腸小腸傳陰氣而下故居在下所以相去而遠也又諸府者皆陽也清淨之處今大腸小腸胃與膀胱皆受不淨其意何也然諸府者謂是非也經言小腸者受盛之府也大腸者傳瀉行道之府也膽者清淨之府也胃者水穀之府也膀胱者津液之府也一府猶無兩名故知非也滑謂諸府為清淨之處者其說非也今大腸小腸胃與膀胱各有受任則非陽之清淨矣各為五藏之府固不得而兩名也蓋諸府體為陽而用則陰經所謂濁陰歸六府是也云諸府皆陽清淨之處唯膽足以當之耳徐通行陽氣即營衛之氣靈營衛生會篇云行陽二十五度行陰二十五度是也陰氣濁氣也謂穢滓所歸也按諸府者謂是非也言清淨之處謂諸府為皆是者則非也唯膽之一府為爾耳楊注謂是非者言諸府各別其所傳化此為是也小腸為府此為非也是殆為強解素問金匱真言論曰言人身之藏府中陰陽則藏者為陰府者為陽靈樞本輸篇曰肺合大腸大腸者傳道之府心合小腸小腸者受盛之府肝合膽膽者中精之府脾合胃胃者五穀之府腎合膀胱膀胱者津液之府也小腸者心之府大腸者肺之府胃者脾之府膽者肝之府膀胱者腎之府小腸謂赤腸大腸謂白腸膽者謂青腸胃者謂黃腸膀胱者謂黑腸下焦所治也楊腸者取其積貯熟治之義也故以名之滑此以五藏之色分別五府而皆以腸名之也徐靈營衛生會篇云水穀者嘗並居胃中成糟粕而俱下於大腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱焉故至府皆下焦之氣所治也按本義曰下焦所治一句屬膀胱此說不可從三十六難曰藏各有一耳腎獨有兩者何也然腎兩者非皆腎也其左者為腎右者為命門命門者謂精神之所舍原氣之所繫也故男子以藏精女子以系胞故知腎有一也謂精神舊作諸神精今據三十九難改訂滑腎之有兩者以左者為腎右者為命門也男子於此而藏精受五藏六府之精而藏之也女子於此而系胞是得精而能施化胞則受胎之所也原氣謂齊下腎間動氣人之生命十二經之根本也此篇言非皆腎也三十九難亦言左為腎右為命門而又云其氣與腎通是腎之兩者其實則一爾徐靈素並無右腎為命門之說靈根結篇云太陽根於至陰結於命門命門者目也靈衛氣篇亦云命門者目也素陰陽離合論云太陽根於至陰結於命門名曰陰中之陽經文所云止此按五行大義曰八十一問云藏各有一腎獨兩者何也左者腎右者命門命門者精神之所會也問云前解腎陰故雙今言左腎右命門此豈不自乖張乎答曰命門與腎名異形同水藏則體質不殊故雙主陰數為名則左右兩別故各有所主猶如三焦膀胱俱水府不妨兩號此說實得經旨素問上古天真論曰腎者主水受五藏六府之精而藏之故五藏盛乃能寫是男子所言藏精也先子曰女子系胞之胞指子宮言焉然說文曰胞兒生裹也從肉從包漢書外戚傳顏師古注曰胞謂胎之衣也即胞衣之義非子宮也唯素問五藏別論曰腦髓骨脈膽女子胞此六者地氣之所生也氣厥論曰胞移熱於膀胱則癃溺血靈樞五音五味篇曰衝脈任脈皆起於胞中雲者與此段同義而古又與脬通見於靈樞五味論史倉公傳三十七難曰五藏之氣於何發起通於何許可曉以不然五藏者當上關於九竅也故肺氣通於鼻鼻和則知香臭矣肝氣通於目目和則知白黑矣脾氣通於口口和則知穀味矣心氣通於舌舌和則知五味矣腎氣通於耳耳和則知五音矣五藏不和則九竅不通六府不和則留結為癰滑謝氏云本篇問五藏之氣於何發起通於何許答文止言五藏通九竅之義而不及五藏之發起恐有缺文愚按五藏發起當如二十三難流注之義上關九竅靈樞作七竅者是後二句結上起下之辭五藏陰也陰不和則病於內六府陽也陽不和則病於外徐此段乃靈脈度篇全文止易數字經云五藏常內關於上七竅也按五行大義曰五藏候在五官口舌二管共在一處余不共者口是脾候脾土也舌是心候心火也共處者土寄治於火鄉也舌在口內者火於五行不常見也須之則有不用則隱如舌在口內開口即見閉口則藏又心為身之主貴故在內也又曰肝主目者肝木藏也木是陽東方顯明之地眼目亦光顯照了故通乎目腎主耳者腎水藏水陰也北方陰暗之地耳能聽聲聲是陰微之象故通乎耳以鼻應肺者鼻以空虛納氣肺亦虛而受氣故也素問陰陽應象大論曰心主舌又曰在竅為舌次注舌所以司辨五味也金匱真言論云南方赤色入通於心開竅於耳尋其為竅則舌義便乖以其主味故云舌也邪在六府則陽脈不和陽脈不和則氣留之氣留之則陽脈盛矣邪在五藏則陰脈不和陰脈不和則血留之血留之則陰脈盛矣陰氣太盛則陽氣不得相營也故曰格陽氣太盛則陰氣不得相營也故曰關陰陽俱盛不得相營也故曰關格關格者不得盡其命而死矣徐此篇自首至此皆靈樞脈度篇原文而將關格二字陰陽倒置脈度篇云陰氣太盛陽氣不能營故曰關陽氣太盛陰氣不能營故曰格素問六節藏象論云人迎四盛以上為格陽寸口四盛以上為關陰靈樞終始篇云人迎四盛且大且數名曰溢陽溢陽為外格脈口四盛且大且數名曰溢陰溢陰為內關經文並無以陰盛為格陽盛為關者不知傳寫之誤抑越人之易經文也經言氣獨行於五藏不營於六府者何也然氣之所行也如水之流不得息也故陰脈營於五藏陽脈營於六府如環之無端莫知其紀終而復始其不覆溢人氣內溫於藏府外濡於腠理滑此因上文營字之意而推及之也亦與靈樞十七篇文大同小異所謂氣獨行於五藏不營於六府者非不營於六府也謂在陰經則營於五藏在陽經則營於六府脈氣周流如環無端則無關格覆溢之患而人之內得以溫於藏府外得以濡於腠理矣三十八難曰藏唯有五府獨有六者何也然所以府有六者謂三焦也有原氣之別焉主持諸氣有名而無形其經屬手少陽此外府也故言府有六焉楊三焦無內者惟有經脈名手少陽故曰外府也滑三焦主持為原氣別使者以原氣賴其導引潛行默運於一身之中無或間斷也外府指其經手少陽而言蓋三焦外有經而內無形故云詳見六十六難三十九難曰經言府有五藏有六者何也然六府者正有五府也然五藏亦有六藏者謂腎有兩藏也其左為腎右為命門命門者謂精神之所舍也男子以藏精女子以系胞其氣與腎通故言藏有六也府有五者何也然五藏各一府三焦亦是一府然不屬於五藏故言府有五焉滑前篇言藏有五府有六此言府有五藏有六者以腎之有兩也腎之兩雖有左右命門之分其氣相通實皆腎而已府有五者以三焦配合手心主也合諸篇而觀之謂五藏五府可也五藏六府亦可也六藏六府亦可也四十難曰經言肝主色心主臭脾主味肺主聲腎主液鼻者肺之候而反知香臭耳者腎之候而反聞聲其意何也然肺者西方金也金生於巳巳者南方火也火者心心主臭故令鼻知香臭腎者北方水也水生於申申者西方金金者肺肺主聲故令耳聞聲楊五行有相因成事有常體成事者至如肺腎二藏相因成也其餘三藏自成之也按五行大義曰五行非直性相雜當方亦有雜義南方丙丁巳午未丙火也丁中有雜水巳中有生金西方庚辛申酉戌庚金也辛中有雜火申中有生水四十一難曰肝獨有兩葉以何應也然肝者東方木也木者春也萬物始生其尚幼小意無所親去太陰尚近離太陽不遠猶有兩心故有兩葉亦應木葉也楊肝者據大葉言之則是兩葉也若據小葉言之則多葉矣徐何應謂其義何所應也下條云肝有七葉蓋於兩葉中細分之左則三岐右則四岐也其尚幼小言物皆生於春其體皆幼肝應乎其時得萬物初生之體非謂春時肝始生也素金匱真言論云陽中之陽心也陰中之陰腎也陰中之陽肝也腎水太陰為肝之母心火太陽為肝之子肝為陰中之陽居腎之上心之下故曰尚近不遠也無親謂不專屬也兩心或從乎陽或從乎陰也下文肝有七葉左三葉奇數從陽之義右四葉偶數從陰之義然凡木之甲拆皆兩葉此乃木之本體故肝與之相應四十二難曰人腸胃長短受水穀多少各幾何然胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升其中常留谷二斗水一斗五升小腸大二寸半徑八分分之少半長三丈二尺受谷二斗四升水六升三合合之大半回腸大四寸徑一寸半長二丈一尺受谷一斗水七升半廣腸大八寸徑二寸半長二尺八寸受谷九升三合八分合之一故腸胃凡長五丈八尺四寸合受水穀八斗七升六合八分合之一此腸胃長短受水穀之數也楊凡人食入於口而聚於胃故經云胃者水穀之海胃中谷熟則傳入小腸也小腸受胃之谷而傳入於大腸分谷三分有二為大半有一為少半回腸者大腸也受小腸之谷而傳入於廣腸焉廣腸者䐈腸也一名肛門受大腸之谷而傳出虞水穀自胃有三斗五升傳入小腸則谷剩四斗水少八升六合合之少半又傳入大腸水穀之數比之在胃各減一半至此則水分入膀胱谷傳入肛門也徐大言其四圍徑言其口之廣凡圓形者徑一則圍三故圍大一尺五寸則徑五寸也胃在腹中其形盤曲而生故曰橫屈按以圍三徑一之法約之則大四寸者徑當一寸二分分之少半回腸云一寸半疑誤又廣腸大八寸則不止二寸半當得二寸六分分之大半下文云徑二寸大半為是此疑誤脫大字廣腸止云受谷而不及水義最精細蓋水穀入大腸之時已別泌精液入於膀胱惟糟粕傳入廣腸使從大便出故不云受水多少也凡總上受水穀之數靈平人絶谷篇云九斗二升一合合之大半乃為合數而此所云與上文不符或傳寫之誤按史記項羽本紀曰漢有天下大半注韋昭云凡數三分有二為大半一為少半肝重四斤四兩左三葉右四葉凡七葉主藏魂心重十二兩中有七孔三毛盛精汁三合主藏神脾重二斤三兩扁廣三寸長五寸有散膏半斤主裹血溫五藏主藏意肺重三斤三兩六葉兩耳凡八葉主藏魄腎有兩枚重一斤一兩主藏志徐散膏津液之不凝者裹血謂統之使不散也垂下為葉旁出為耳是肺共成八葉按說文曰銖十分黍之重也從金朱聲又曰二十四銖為一兩從一坰從平分坰從亦聲漢律曆志曰權者銖兩斤鈞石也所以稱物平施知輕重也本起於黃鐘之重一籥容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤膽在肝之短葉間重三兩三銖盛精汁三合胃重二斤二兩紆曲屈伸長二尺六寸大一尺五寸徑五寸盛谷二斗水一斗五升小腸重二斤十四兩長三丈二尺廣二寸半徑八分分之少半左回疊積十六曲盛谷二斗四升水六升三合合之大半大腸重二斤十二兩長二丈一尺廣四寸徑一寸當齊右回十六曲盛谷一斗水七升半膀胱重九兩二銖縱廣九寸盛溺九升九合紀紆曲屈伸者言其使物往而復有也雖能屈留其物而不得久停復伸去之故曰紆曲屈伸徐靈腸胃篇云回腸當臍左環回周葉積而下回運環反十六曲大四寸徑一寸寸之少半其長短受盛與經文俱同水從大腸滲入膀胱則為溺不與谷同居故不曰水而曰溺口廣二寸半唇至齒長九分齒以後至會厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十兩廣二寸半至胃長一尺六寸喉嚨重十二兩廣二寸長一尺二寸九節肛門重十二兩大八寸徑二寸大半長二尺八寸受谷九升三合八分合之一楊咽咽也言可以咽物也又謂之嗌言氣之流通厄要之處也咽為胃之系也故經云咽主地氣喉嚨空虛也言其中空虛可以通氣息焉即肺之系也呼吸之道路故經云喉主天氣肛釭也言其處似車釭形故曰肛門即廣腸之門也又名䐈腸按靈樞憂恚無言篇曰咽喉者水穀之道也喉嚨者氣之所以上下者也會厭者音聲之戶也四十三難曰人不食飲七日而死者何也然人胃中常有留谷二斗水一斗五升故平人日再至圊一行二升半日中五升七日五七三斗五升而水穀盡矣故平人不食飲七日而死者水穀津液俱盡即死矣楊圊廁也徐日中五升靈平人絶谷篇作一日中五升言一日之中共去五升也按先子曰三斗五升兼水穀而為言然漢書食貨志曰今一夫挾五口食人月一石半則知人一日食五升也又後漢南蠻傳曰計人稟五升注古升小故曰五升也據此七日得三斗五升則水飲不預焉七日益以陰陽五行之數論之耳七日不食豈有死者乎四十四難曰七衝門何在然唇為飛門齒為戶門會厭為吸門胃為賁門太倉下口為幽門大腸小腸會為闌門下極為魄門故曰七衝門也楊會厭為吸門者會厭為五藏音聲之門戶故云會厭為吸門也胃為賁門賁者膈也胃氣之所出也胃出穀氣以傳肺肺在膈上故以胃為賁門也太倉下口為幽門太倉者胃也胃之下口在齊上三寸既幽隱之處故曰幽門也丁齒為戶門者為關鍵開合五穀由此摧廢出入也會厭為吸門者咽喉為水穀下時厭按呼吸也大腸小腸會為闌門會者合也大腸小腸合會之處分闌水穀精血各有所歸故曰闌門也滑會厭謂咽嗌會合也厭猶掩也謂當咽物時合掩喉嚨不使食物誤入以阻其氣之噓吸出入也按衝門者承上文謂水穀通行之門也楊注以沖為通是也然言藏府之氣通出之所則未盡本義曰沖衝要之沖亦非經旨唇為飛門者飛古與扉通素問皮部論曰陽明之陽名曰害蜚是亦闔扉之義說文曰戶護也半門曰戶象形扉戶扇也從戶非聲蓋齒為戶門則唇為之扇故曰扉門靈樞憂恚無言篇曰口唇者音聲之扇也諸病源候論作音聲之扉諸注為飛動之義未免傅會胃為賁門者楊注賁者膈也為是膈即防隔濁氣之謂賁亦與墳通而義與隔同爾雅曰墳大防也注謂隄也可以證矣素問繆刺論曰邪客於足少陰之絡令人善怒氣上走賁上新校正云是氣上走鬲上也靈樞經筋篇曰手太陰之筋下絡胸裡散貫賁合賁下抵季脅脈要精微論曰尺中附上內以候鬲次注肝主賁賁鬲也是亦以膈稱賁也或曰既有防隔之義不可又謂之門曰漢書溝洫志九河之名有鬲津顏師古云鬲津言其陝小可鬲以為津而度也鬲與隔同據此賁門鬲津其義相同丁注曰言若虎賁圍繞之象本義曰物之所賁響也與奔同俱為強解靈樞脹論曰胃者太倉也說文曰倉谷藏也倉黃取而藏之故謂之倉大腸小腸會為闌門者楊注為遺失之義考僧玄應一切經音義引通俗文曰縱出曰蘭是其所據然不若丁注為確說文曰闌門遮也從門柬聲下極為魄門者先子曰謂糟粕之所出也魄古與粕通莊子天道篇曰古人之糟魄已夫釋文云司馬彪云爛食曰粕一云糟爛為魄又作粕素問五藏別論曰魄門亦為五藏使水穀不得久藏楊注曰肛門是肺氣之所出也肺藏使故曰魄門本義曰魄門亦取幽陰之義經釋曰飲食至此精華已去止存形質故曰魄門即所謂鬼門也此說並誤四十五難曰經言八會者何也然府會大倉藏會季脅筋會陽陵泉髓會絶骨血會鬲俞骨會大杼脈會大淵氣會三焦外一筋直兩乳內也熱病在內者取其會之氣穴也楊人藏府筋骨髓血脈氣此八者皆有會合之穴若熱病在於內則於外取其所會之穴以去其疾也季脅章門穴也三焦外一筋直兩乳內者膻中穴也丁季脅軟肋之名滑太倉一名中脘在齊上四寸六府取稟於胃故為府會季脅章門穴也在大橫外直齊季肋端為脾之募五藏取稟於脾故為藏會足少陽之筋結於膝外廉陽陵泉也在膝下一寸外廉陷中又膽與肝為配肝者筋之合故為筋會絶骨一名陽輔在足外踝上四寸輔骨前絶骨端如前三分諸髓皆屬於骨故為髓會鬲俞在背第七椎下去脊兩旁各一寸半足太陽脈氣所發也太陽多血又血乃水之象故為血會大淵在掌後陷中動脈即所謂寸口者脈之大會也四明陳氏曰髓會絶骨髓屬於腎腎主骨於足少陽無所關腦為髓海腦有枕骨穴則當會枕骨絶骨誤也血會鬲俞血者心所統肝所藏鬲俞在七椎下兩旁上則心俞下則肝俞故為血會徐絶骨屬足少陽即懸鐘穴在外踝上四寸靈經脈篇論足少陽之脈云是主骨蓋諸髓皆屬於骨故為絶骨大杼屬足太陽在項後第一椎下去脊旁一寸半靈海論云衝脈為十二經之海其輸在於大杼動輸篇云衝脈與腎之大絡起於腎下蓋腎主骨膀胱與腎合故為骨會三焦外謂在焦膜之外兩乳內謂兩乳之中任脈之所過即膻中穴也靈經脈篇手少陽之脈是主氣又海論云膻中者為氣之海故為氣會按經釋以絶骨為懸鐘誤辨正條例曰三焦證以注文穴在膻中即上焦之分所言三者乃字之誤辨正作上本義曰謝氏云三焦當作上焦此未為得蓋三焦直指上焦而言若內經專稱下焦為三焦矣四十六難曰老人臥而不寐少壯寐而不寤者何也然經言少壯者血氣盛肌肉滑氣道通榮衛之行不失於常故晝日精夜不寤老人血氣衰氣肉不滑榮衛之道澀故晝日不能精夜不得寐也故知老人不得寐也楊衛氣者晝日行於陽陽者身體也夜行於陰陰者腹內也人目開衛氣出則寤入則寐少壯者衛氣行不失於常故晝得安靜而夜得穩眠也老者衛氣出入不得應時故晝不得安靜夜不得寐也精者靜也靜安也按說文曰寐臥也從夢省未聲寤寐覺而有信曰寤從夢省五聲一曰晝見而夜夢也精字訓靜未妥精目之明也出於荀子解蔽篇用精惑也注四十七難曰人面獨能耐寒者何也然人頭者諸陽之會也諸陰脈皆至頸胸中而還獨諸陽脈皆上至頭耳故令面耐寒也徐靈逆順肥瘦篇曰手之三陰從藏走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹此之謂也按此章問答亦本靈邪氣藏府病形篇經文云十二經脈三百六十五絡其血氣皆上於面而走空竅又云其皮厚其肉堅故天熱甚寒不能勝之也此改作諸陽經之氣皆上於頭蓋本逆順肥瘦篇義移作此處注解理極明實與經文異致而同歸也按自三十難至此論藏府是為第三篇四十八難曰人有三虛三實何謂也然有脈之虛實有病之虛實有診之虛實也脈之虛實者濡者為虛緊牢者為實病之虛實者出者為虛入者為實言者為虛不言者為實緩者為虛急者為實診之虛實者濡者為虛牢者為實癢者為虛痛者為實外痛內快為外實內虛內痛外快為內實外虛故曰虛實也脈經上文濡者作脈來耎者無緊字下文無濡者為虛牢者為實八字楊藏氣虛精氣脫故多言語也藏氣實邪氣盛故不欲言語也濡者為虛皮膚濡緩也牢者為實皮肉牢強也癢者為虛身體虛癢也身形有痛處皆為實輕手按之則痛為外痛病淺故也重手按之則快為內虛病深故也重手按之則痛為內實病深故也輕手按之則快為外虛病淺故也凡人病按之則痛者皆為實按之則快者皆為虛也丁陰陽者主其內外也今陽不足陰出乘之在內俱陰故知出者為虛也陰不足陽入乘之在外俱陽故知入者為實也滑濡者為虛緊牢者為實此脈之虛實也出者為虛是五藏自病由內而之外所謂內傷是也入者為實是五邪所傷由外而之內所謂外傷是也不言者為實以人之邪氣內郁故昏亂而不言也診按也候也按其外而知之非診脈之診也濡者為虛牢者為實脈經無此二句謝氏以為衍文楊氏謂按之皮肉柔濡者為虛牢強者為實然則有亦無害外痛內快為邪盛之在外內痛外快為邪盛之在內矣徐濡柔弱軟弱也傷寒論云諸濡亡血又云濡則衛氣微可見濡為氣血兩虛之候弦徑曰緊堅實曰牢素平人氣象論脈盛而緊曰脹傷寒論云趺陽脈緊者脾氣強又云寒則堅牢可見緊牢為邪氣實之候脈不止此二種舉此以類推也緩病來遲也正氣奪而邪氣微則病漸深急病來驟也正氣未病而邪氣盛則病疾速也按自四十八難至六十一難論病是為第四篇四十九難曰有正經自病有五邪所傷何以別之然經言憂愁思慮則傷心形寒飲冷則傷肺恚怒氣逆上而不下則傷肝飲食勞倦則傷脾久坐濕地強力入水則傷腎是正經之自病也呂心為神五藏之君聰明才智皆由心出憂勞之甚則傷其心心傷神弱也肺主皮毛形寒者皮毛寒也飲冷者傷肺也肺主受水漿水漿不可冷飲肺又惡寒故曰傷也肝與膽為藏府其氣勇故主怒怒則傷也飲食飽胃氣滿脾絡恆急或走馬跳躍或以房勞脈絡裂故傷脾也久坐濕地謂遭憂喪強力者謂舉重引弩入水者謂復溺於水或婦人經水未過強合陰陽也虞久坐濕地則外濕內感於腎合之風寒發為瘴病強力過用必致自傷也經脈別論曰持重遠行必傷於腎生氣通天論曰因而強力腎氣乃傷高骨乃壞經脈別論云度水跌僕喘出於腎與骨也滑此與靈樞第四篇文大同小異但傷脾一節作若醉入房汗出當風則不同爾謝氏曰飲食勞倦自是二事飽食得者飢飽失時勞倦者勞形力而致倦怠也此本經自病者病由內作非外邪之干所謂內傷者也或曰坐濕入水亦從外得之也何為正經自病曰此非天之六淫也何為五邪然有中風有傷暑有飲食勞倦有傷寒有中濕此之謂五邪呂肝主風心主暑脾主勞倦肺主寒腎主濕此五病從外來也虞正經自病亦言飲食勞倦傷脾今五邪亦言飲食勞倦正經病謂正經虛又傷飲食五邪病謂食飲傷於脾而致病也假令心病何以知中風得之然其色當赤何以言之肝主色自入為青入心為赤入脾為黃入肺為白入腎為黑肝為心邪故知當赤色也其病身熱脅下滿痛其脈浮大而弦呂身熱者心滿痛者肝二藏之病證也浮大者心弦者肝二藏脈見應也按辨正條例曰假令肝病注義云心病按下文肝主色及言自入入心入脾入肺入腎皆主肝而言則知非心病又其文云其病身熱脅下滿痛皆肝病之證則知注義之非今從補注與權此說反非經釋曰自此以下五段乃舉心之受五邪為言餘四藏可類推也何以知傷暑得之然當惡臭何以言之心主臭自入為焦臭入脾為香臭入肝為臊臭入腎為腐臭入肺為腥臭故知心病傷暑得之也當惡臭其病身熱而煩心痛其脈浮大而散呂心主暑今傷暑此正經自病不中他邪徐臭字上以下文推之當有焦字浮大心之本脈散則浮大而空虛無神心之病脈何以知飲食勞倦得之然當喜苦味也虛為不欲食實為欲食何以言之脾主味入肝為酸入心為苦入肺為辛入腎為咸自入為甘故知脾邪入心為喜苦味也其病身熱而體重嗜臥四肢不收其脈浮大而緩呂心主傷熱脾主勞倦今心病以飲食勞倦得之故知脾邪入心也身熱者心也體重者脾也此二藏病證也浮大者心脈緩者脾脈也徐虛則脾氣不能化谷實則尚能化谷故有能食不能食之分蓋風寒暑濕其氣不殊故無虛實之辨按本義曰虛為不欲食實為欲食二句於上下文無所發明疑錯文也此說不是何以知傷寒得之然當譫言妄語何以言之肺主聲入肝為呼入心為言入脾為歌入腎為呻自入為哭故知肺邪入心為譫言妄語也其病身熱灑灑惡寒甚則喘咳其脈浮大而澀呂身熱者心惡寒者肺此二藏病證也浮大者心脈澀者肺脈也紀高承德疏云呼者長呼也歌者歌曲也呻者呻吹也天錫言千金云肝實令人叫呼不已王冰注呼者叫呼也歌者歌嘆也呻者呻吟也據高疏恐未中理何以知中濕得之然當喜汗出不可止何以言之腎主液入肝為泣入心為汗入脾為涎入肺為涕自入為唾故知腎邪入心為汗出不可止也其病身熱而小腹痛足脛寒而逆其脈沉濡而大此五邪之法也液舊作濕今從周氏改涎舊作液今從諸注本改之呂心主暑腎主濕今心病以傷濕得之故知腎邪入心也身熱者心小腹痛者腎腎邪干心此二藏病證也大者心脈沉濡者腎脈也滑腎化五液腎為心邪故汗出不可止徐此以心一經為主病而以各證驗其所從來其義與十難診脈法同以一經為例而余則准此推廣使其無所不貫五十難曰病有虛邪有實邪有賊邪有微邪有正邪何以別之然從後來者為虛邪從前來者為實邪從所不勝來者為賊邪從所勝來者為微邪自病者為正邪何以言之假令心病中風得之為虛邪傷暑得之為正邪飲食勞倦得之為實邪傷寒得之為微邪中濕得之為賊邪呂心王之時脈當洪大而長反得弦小而急是肝王畢未傳於心奪心之王是肝往乘心故言從後來也肝為心之母母之乘子是為虛邪也心王得脾脈心王畢當傳脾今心王未畢是脾來逆奪其王故言從前來也脾者心之子子之乘母是為實邪心王得腎脈水勝火故是為賊邪也心王反得肺脈火勝金故為微邪也心王之時脈實強太過反得虛微為正邪也心主暑今心自病傷暑故為正邪也脾主勞倦故為實邪肺主寒又畏心故為微邪腎主濕水剋火故為賊邪徐後謂生我者也邪挾生氣而來則雖進而易退故為虛邪前我生者受我之氣者其力方旺還而相剋其勢必甚故為實邪按素八正神明論云虛邪八正之虛邪也正邪者身形用力汗出腠理開所中之風也其所謂虛邪乃虛風乃太乙所居之宮從其沖後來者為虛風也正風汗出毛孔開所受之風也其詳見靈九宮八風篇與此所云虛邪正邪各不同然襲其名而義自別亦無妨也五十一難曰病有欲得溫者有欲得寒者有欲得見人者有不欲得見人者而各不同病在何藏府也然病欲得寒而欲見人者病在府也病欲得溫而不欲得見人者病在藏也何以言之府者陽也陽病欲得寒又欲見人藏者陰也陰病欲得溫又欲閉戶獨處惡聞人聲故以別知藏府之病也紀府為陽陽病則熱有餘而寒不足故飲食衣服居處皆欲就寒也陽主動而應乎外故欲得見人藏為陰陰病則寒有餘而熱不足故飲食衣服居處皆欲就溫也陰主靜而應乎內故欲閉戶獨處而惡聞人聲也五十二難曰府藏發病根本等不然不等也其不等奈何然藏病者止而不移其病不離其處府病者倣佛賁響上下行流居處無常故以此知藏府根本不同也丁藏病為陰陰主靜故止而不移府病為陽陽主動故上下行流居處無常按倣佛與倣佛通說文曰仿相似也從人方聲佛見不審也從人弗聲文選傅毅舞賦曰倣佛神動據此倣佛言府病遊移不審其處也賁響即奔響經釋為賁動有聲是靈樞壽夭剛柔篇曰氣痛時來時去怫愾賁響又百病始生篇曰虛邪之中人也傳舍於腸胃在腸胃之時賁響腹脹多寒則腸鳴楊上善太素經耶傳篇注賁響虛起貌五十三難曰經言七傳者死間藏者生何謂也然七傳者傳其所勝也間藏者傳其子也何以言之假令心病傳肺肺傳肝肝傳脾脾傳腎腎傳心一藏不再傷故言七傳者死也間藏者傳其所生也呂七當為次字之誤也此下有間字即知上當為次此蓋次傳其所勝藏故其病死也按虞注反以呂為誤非素問平人氣象論曰脈反四時及不間藏曰難已又標本病傳論曰諸病以次是相傳者皆有死期不可刺間一藏止及至三四藏者乃可刺也假令心病傳脾脾傳肺肺傳腎腎傳肝肝傳心是母子相傳竟而復始如環之無端故言生也呂間藏者間其所勝藏而相傳也心勝肺脾間之肝勝脾心間之脾勝腎肺間之肺勝肝腎間之腎勝心肝間之此謂傳其所生也五十四難曰藏病難治府病易治何謂也然藏病所以難治者傳其所勝也府病易治者傳其子也與七傳間藏同法也滑藏病難治者以傳其所勝也府病易治者以傳其所生也雖然此特各舉其一偏而言爾若藏病傳其所生亦易治府病傳其所勝亦難治也五十五難曰病有積有聚何以別之然積者陰氣也聚者陽氣也故陰沉而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五藏所生聚者六府所成也積者陰氣也其始發有常處其痛不離其部上下有所終始左右有所窮處聚者陽氣也其始發無根本上下無所留止其痛無常處謂之聚故以是別知積聚也滑積者五藏所生五藏屬陰陰主靜故其病沉伏而不離其處聚者六府所成六府屬陽陽主動故其病浮動而無所留止也周仲立云陰沉而伏初亦未覺漸以滋長日積月纍是也聚者病之所在與血氣偶然邂逅故無常處也與五十二難意同按靈樞百病始生篇曰積之始生得寒乃生厥乃成積也又曰虛邪之中人也傳舍於腸胃之外募原之間留著於脈稽留而不去息而成積五十六難曰五藏之積各有名乎以何月何日得之然肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發咳逆㾬瘧連歲不已以季夏戊己日得之何以言之肺病傳於肝肝當傳脾脾季夏適王王者不受邪肝復欲還肺肺不肯受故留結為積故知肥氣以季夏戊己日得之楊積畜也言血脈不行積畜成病也凡積者五藏所生也榮氣常行不失節度謂之平人平人者不病也一藏受病則榮氣壅塞故病焉然五藏受病者則傳其所勝所勝適王則不肯受傳既不肯受則反傳所勝所勝復不為納於是則留結成積漸以長大病因成矣肥氣者肥盛也言肥氣聚於左脅之下如覆杯突出如肉肥盛之狀也小兒多有此病按前章有積有聚此章唯出五積之名狀不言諸聚聚者六府之病亦相傳行還如五藏以勝相加故不重言從省約也積畜舊作積蓋今從本義改訂滑咳逆者足厥陰之別貫膈上注肺肝病故胸中咳而逆也內經五藏皆有瘧此在肝為風瘧也抑以瘧為寒熱病多屬少陽肝與之為表裡故云左脅肝之部按靈樞邪氣藏府病形篇曰肝脈微急為肥氣在脅下若覆杯㾬字說文所無即痎之異構脈經引此段作痎瘧又素問瘧論曰痎瘧皆生於風新校正引太素經注作㾬瘧說文曰瘧熱寒休作從疒虐虐亦聲痎二日一發瘧從疒亥聲心之積名曰伏梁起齊上大如臂上至心下久不愈令人病煩心以秋庚辛日得之何以言之腎病傳心心當傳肺肺以秋適王王者不受邪心復欲還腎腎不肯受故留結為積故知伏梁以秋庚辛日得之滑伏梁伏而不動如梁木然按靈樞邪氣藏府病形篇曰心脈微緩為伏梁在心下上下行時唾血又經筋篇曰手少陰之筋其病內急心承伏梁下為肘綱此並以伏梁為心病而素問腹中論所謂伏梁與此不同說文曰梁水橋也從木從水創聲脾之積名曰痞氣在胃脘覆大如盤久不愈令人四肢不收發黃疸飲食不為肌膚以冬壬癸日得之何以言之肝病傳脾脾當傳腎腎以冬適王王者不受邪脾復欲還肝肝不肯受故留結為積故知痞氣以冬壬癸日得之楊痞否也言否結成積也脾氣虛則胃中熱而引食焉脾病不能通氣行津液故雖食多而羸瘦也按素問平人氣象論曰溺黃赤安臥者黃疸又曰目黃者黃疸說文曰疸黃病也從疒旦聲肺之積名曰息賁在右脅下覆大如杯久不已令人灑淅寒熱喘咳發肺壅以春甲乙日得之何以言之心病傳肺肺當傳肝肝以春適王王者不受邪肺復欲還心心不肯受故留結為積故知息賁以春甲乙日得之滑右脅肺之部肺主皮毛故灑淅寒熱徐息賁氣息奔迫也按素問陰陽別論曰二陽之病發心脾有不得隱曲女子不月其傳為風消有傳為息賁者死不治次注傳為入肺喘息而上奔靈樞邪氣藏府病形篇曰肺脈滑甚為息賁上氣又經筋篇曰手太陰之筋其病甚成息賁喘急吐血又曰手心主之筋其病胸痛息賁此息賁氣息奔逆之謂徐說為得賁奔古通夏小正曰玄駒賁賁者何也走於地中也下文賁豚之賁亦同楊注息長也賁鬲也漸長而逼於鬲本義曰或息或奔並非肺壅甲乙經脈經作肺癰是壅古與癰通素問大奇論曰肺之雍喘而兩胠滿新校正云肺壅肝壅腎雍甲乙經俱作癰腎之積名曰賁豚發於少腹上至心下若豚狀或上或下無時久不已令人喘逆骨痿少氣以夏丙丁日得之何以言之脾病傳腎腎當傳心心以夏適王王者不受邪腎復欲還脾脾不肯受故留結為積故知賁豚以夏丙丁日得之此是五積之要法也楊此病狀似豚而上衝心又有奔豚之氣非此積病也名同而疾異焉滑令人喘逆者足少陰之支從肺出絡心注胸中故也徐少腹腎之分至心下言上則至心而止喘逆腎氣上衝也素問逆調論曰腎主臥與喘腎主骨故骨痿下焦不能納氣故少氣按靈樞邪氣藏府病形篇曰腎脈微急為沉厥奔豚甲乙經豚作肫訛說文曰小豕也從彖省肖形篆文從肉豕用豚又曰肫面頯也從肉屯聲是其義自異諸病源候論作賁㹠㹠即豚俗字見於廣韻五十七難曰泄凡有幾皆有名不然泄凡有五其名不同有胃泄有脾泄有大腸泄有小腸泄有大瘕泄名曰後重胃泄者飲食不化色黃脾泄者腹脹滿泄注食即嘔吐逆大腸泄者食已窘迫大便色白腸鳴切痛小腸泄者溲而便膿血少腹痛大瘕泄者裡急後重數至圊而不能便莖中痛此五泄之法也本義經釋作要法也楊泄利也胃屬土故其利色黃而飲食不化焉化變也消也言所食之物皆完出不消變也注者無節度也言利下猶如注水不可禁止焉脾病不能化谷故食即吐逆也窘迫急也食訖即欲利迫急不可止也白者從肺色焉腸鳴切痛者冷也切者言痛如刀切其腸之狀也小腸屬心心主血脈故便膿血小腸處在少腹故少腹痛也瘕結也少腹有結而又下利者是也一名利重後者言大便處疼重也數欲利至所即不利又痛引陰莖中此是腎泄也丁裡急者腸中痛後重者腰以上沉重也陳胃泄即飧泄也脾泄即濡泄也大腸泄即洞泄也小腸泄謂凡泄則小便先下而便血即血泄也大瘕泄即腸癖也徐名曰後重此專指大瘕泄而言蓋腎邪下結氣墜不升故也五十八難曰傷寒有幾其脈有變不然傷寒有五有中風有傷寒有濕溫有熱病有溫病其所苦各不同徐傷寒統名也下五者傷寒之分證也按王叔和編次仲景傷寒論略例云中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也又第四篇先序痓濕暍三證痓則傷寒之變證暍即熱病濕即此篇所謂濕溫也又傷寒論太陽上篇亦首舉中風傷寒溫病證脈各異之法素熱病論云今夫熱病者皆傷寒之類也又云凡病傷寒而成溫者先夏至日為病溫後夏至日為病暑則此五者之病古人皆謂之傷寒與難經淵源一轍後世俗學不明其故聚訟紛紜終無一是是可慨也按肘後方曰傷寒時行溫疫三名一種耳又曰貴勝雅言總名傷寒世俗因號為時行千金方引小品方曰論治者不判傷寒與時行溫疫為異氣耳云傷寒雅士之辭天行溫疫是田舍間號耳不說病之異同也是可證徐說矣有變之變本義曰當作辨謂分別其脈也誤蓋變者謂其有各異不耳中風之脈陽浮而滑陰濡而弱濕溫之脈陽濡而弱陰小而急傷寒之脈陰陽俱盛而緊澀熱病之脈陰陽俱浮浮之滑沉之散澀溫病之脈行在諸經不知何經之動也各隨其經所在而取之楊中風之脈關以前浮滑尺中濡弱者也小細也急疾也輕手按者名浮重手按者名沉也滑上文言傷寒之目此言其脈之辨也陰陽字皆指尺寸而言徐傷寒論云太陽之為病脈浮又云浮則為風靈邪氣藏府病形篇云滑者陽氣盛微有熱又素平人氣象論云脈滑曰病風陽盛則陰虛故陰脈濡而弱也濕熱傷陰故陽脈無力而濡弱陰脈則邪盛而小急寒邪中人營衛皆傷故陰陽俱盛緊者陰脈之象傷寒論云脈陰陽俱緊者名曰傷寒又云諸緊為寒澀者血氣為寒所凝不和利也靈邪氣藏府病形篇澀者多血少氣微有寒按溫病所現何脈越人無明文當以傷寒論補之論云風溫為病脈陰陽俱浮是也按傷寒論曰太陽病發熱汗出惡風脈緩者名為中風又曰太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出又曰太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名為傷寒並此段之意也謝縉孫曰按仲景例風溫與難經中風脈同而無濕溫之說此說誤矣風溫溫病之類證濕溫見於玉函經曰濕溫其人常傷於濕因而中暍濕熱相薄則發濕溫熱病之脈沉之散澀澀字恐衍蓋熱病之脈重按則散大輕按則滑利也滑澀相反無並見之理素問生氣通天論曰冬傷於寒春必溫病次注寒不為釋陽怫於中寒怫相持為溫病又熱論曰凡病傷寒而成溫者先夏至日者為病溫傷寒論曰太陽病發熱而渴不惡寒者為溫病亦是與此段同楊注曰溫病則是疫癘之病非為春病也殆為謬解行在諸經者寒毒之藏於皮膚者浸淫而後為病故不知其定在何經也其脈之現象未知與風溫相類否古經缺詳姑據徐說傷寒有汗出而愈下之而死者有汗出而死下之而愈者何也然陽虛陰盛汗出而愈下之即死陽盛陰虛汗出而死下之而愈徐滑氏本義引外臺語謂表病里和為陽虛陰盛表和里病為陽盛陰虛傷寒例亦有陽盛陰虛汗之則死下之則愈陽虛陰虛汗之則愈下之則死之文成無己注則以陽邪乘虛入府為陽盛陰虛陰邪乘表虛客於榮衛為陽虛陰盛活人書以內外俱熱為陽盛陰虛內外俱寒為陽虛陰盛惟王安道溯洄集則以寒邪在外為陰盛可汗熱邪內熾為陽盛可下此說最為無弊按傷寒例又曰桂枝下咽陽盛即斃承氣入胃陰盛以亡據此表寒裡熱之解為確寒熱之病候之如何也然皮寒熱者皮不可近席毛髮焦鼻槁不得汗肌寒熱者皮膚痛唇舌槁無汗骨寒熱者病無所安汗注不休齒本槁痛楊五藏六府皆有寒熱此經惟出三狀余皆闕也滑此蓋內傷之病因以類附之徐寒熱在皮邪之中人最淺者肺主皮毛開竅於鼻故皮有邪則毛髮焦乾而鼻枯藁不澤也不得汗營衛不和也脾主肌肉開竅於口故肌有邪則唇舌皆受病也骨受邪則病最深故一身之中無所得安也腎主骨又主液齒為骨之餘故骨病則腎液泄而為汗齒枯藁而痛也按此段全原乎靈樞寒熱病篇而文多不同鼻藁唇藁下經有臘字齒本藁痛作齒未稿取其少陰於陰股之絡齒已稿死不治先子曰寒熱之病即虛勞寒熱之謂素問脈要精微論曰風成為寒熱又曰沉細數散者寒熱也又平人氣象論曰寸口脈沉而喘曰寒熱又風論曰其寒也則衰飲食其熱也則消肌肉故使人怢慓而不能食名曰寒熱又玉機真藏論曰發寒熱法當三歲死靈樞論疾診尺篇曰尺膚炬然先熱後寒者寒熱也尺膚先寒久大之而熱者亦寒熱也又官能篇曰寒熱淋露以輸異處史倉公傳曰濟北王侍者韓女病要背痛寒熱衆醫皆以為寒熱魏志華他傳注引他別傳曰有婦人長病經年世謂寒熱注病者也可觀古以虛勞骨蒸等稱寒熱病矣五十九難曰狂癲之病何以別之然狂之始發少臥而不飢自高賢也自辨智也自貴倨也妄笑好歌樂妄行不休是也癲疾始發意不樂直視僵仆其脈三部陰陽俱盛是也楊狂病之候觀其人初發之時不欲眠臥又不肯飲食自言賢智尊貴歌笑行走不休皆陽氣盛所為故經言重陽者狂此之謂也今人以為癲謬矣癲顛也發則僵仆焉故有顛蹶之言也陰氣太盛故不得行立而倒僕也今人以為癇疾誤矣按廣雅曰癲狂也顏師古急就篇注曰顛疾性理顛倒失常亦謂之狂也是楊注所非然癲疾亦有類狂者素問脈解篇有狂癲疾之文又厥論曰陽明之厥則癲疾欲走呼陰陽類論曰病在腎罵詈妄行巔疾為狂是癲狂兼病者非為一病也諸病源候論曰癇者小兒病也十歲已上為癲十歲已下為癇也六十難曰頭心之病有厥痛有真痛何謂也然手三陽之脈受風寒伏留而不去者名厥頭痛入連在腦者名真頭痛其五藏氣相干名厥心痛其痛甚但在心手足青者即名真心痛其真心痛者旦發夕死夕發旦死楊去者行也厥者逆也言手三陽之脈伏留而不行則壅逆而衝於頭故名厥頭痛也足三陽留壅亦作頭痛今經不言之從省文故也諸經絡皆屬於心若一經有病其脈逆行逆則乘心乘心則心痛故曰厥心痛是五藏氣衝逆致痛非心家自病也心者五藏六府之主法不受病病即神去氣竭故手足為之清冷也心痛手足冷者為真心痛手足溫者為厥心痛也滑真頭痛其痛甚腦盡痛手足青至節死不治蓋腦為髓海真氣之所聚卒不受邪受邪則死其真心痛者真字下當缺一頭字蓋闕文也手足青之青當作清冷也六十一難曰經言望而知之謂之神聞而知之謂之聖問而知之謂之工切脈而知之謂之巧何謂也然望而知之者望見其五色以知其病聞而知之者聞其五音以別其病問而知之者問其所欲五味以知其病所起所在也切脈而知之者診其寸口視其虛實以知其病在何藏府也經言以外知之曰聖以內知之曰神此方謂也在何上舊剩一病字楊望色者假令肝部見青色者肝自病見赤色者心乘肝肝亦病故見五色知五病也五音者謂宮商角徵羽也以配五藏假令病人好哭者肺病也好歌者脾病也故云聞其音知其病也問病人云好辛味者則知肺病也好食冷者則知內熱故云知所起所在切按也謂按寸口之脈者若弦多者肝病也洪多者心病也浮數則病在府沉細則病在藏故云在何藏也袁五藏之色見於面者各有部分以應相生相剋之候察之以知其病也聞五藏五聲以應五音之清濁或互相勝負或其音嘶嗄之類別其病也問其所欲五味中偏嗜偏多食之物則知藏氣有偏勝偏絶之候也滑以外知之望聞以內知之切也神微妙聖通明也又總結之言聖神則工巧在內矣按自四十八難至此論病是為第四篇靈樞邪氣藏府病形篇曰黃帝問於岐伯云余聞之見其色知其病命曰明按其脈知其病命曰神問其病知其處命曰工說文曰巧技也從工丂聲夫望聞與問以醫之聽視測病之情態故曰神曰聖曰工唯診脈一事在於手技故曰巧也楊注視色聽聲切脈皆在外而知內之病也是說不確六十二難曰藏井滎有五府獨有六者何謂也然府者陽也三焦行於諸陽故置一俞名曰原府有六者亦與三焦共一氣也滎舊訛作榮今據靈樞改訂楊五藏之脈皆以所出為井所流為滎所注為俞所行為經所入為合是謂五俞以應金木水火土也六府亦其俞應五行惟所過為原獨不應五行也原者元也元氣者三焦之氣也其氣尊大故不應五行所以六府有六俞六府既是陽三焦亦是陽故云共一氣也虞詳此經義前後問答文理有闕徐俞穴也靈本輸篇以所過之穴為原蓋三焦所行者遠其氣所流聚之處五穴不足以盡之故別置一穴名曰原也按自六十二難至六十八難論經穴是為第五篇六十三難曰十變言五藏六府滎合皆以井為始者何也然井者東方春也萬物之始生諸蚑行喘息蜎飛蠕動當生之物莫不以春而生故歲數始於春日數始於甲故以井為始也楊凡藏府皆以井為始井者謂谷井爾非謂掘作之井山谷之中泉水初出之處名之曰井井者主出之義也泉水既生留停於近滎迂未成大流故名之曰滎滎者小水之狀也留停既深有注射輪文之處故名之曰俞俞者委積逐流行經歷而成渠徑徑者經也亦經營之義也經行既達合會於海故名之曰合合者會也此是水行流轉之義人之經脈亦法於此故取名焉所以井為始春者以其所生之義也歲數始於春者正月為歲首故也日數始於甲者謂東方甲乙也正月與甲乙皆屬於春也滑蚑者行喘者息息謂噓吸氣也公孫洪傳作蚑行喙息義尤明白蜎者飛蠕者動皆蟲豸之屬按五俞之解楊注頗為詳晰今更疏其義所謂谷井之說蓋原於易井九二曰井谷射鮒甕敝漏王弼注溪谷出水從上注下水常射焉井之為道以下給上者也是則井者經脈之所出也其既出也未能為流利故謂之滎說文曰滎絶小水也從水熒省聲水雖絶小瀦則外瀉故謂之俞俞與輸同說文曰輸委輸也從車俞聲即輸瀉之謂其既輸瀉則為波隴之勢故謂之徑經與徑通爾雅釋水曰直波曰徑注徑涎也水勢若此則遂歸於海故謂之合是五俞取水之義也楊注經字改徑又為經營之義未確本義引項氏家說以俞為窬字亦缺妥說文曰蠕動也從蟲耎聲蚑行也從蟲支聲脈經引四時經曰蜎飛蠕動蚑蠷喘息皆蒙土恩注蛾蚋幾微之蟲因陰陽氣變化而生也喘息有血脈之類也李善文選七發注曰凡生類之行皆謂之蚑六十四難曰十變又言陰井木陽井金陰滎火陽滎火陰俞土陽俞木陰經金陽經火陰合水陽合土陰陽皆不同其意何也然是剛柔之事也陰井乙木陽井庚金陽井庚庚者乙之剛也陰井乙乙者庚之柔也乙為木故言陰井木也庚為金故言陽井金也余皆仿此楊五藏皆為陰陰井為木滎為火俞為土經為金合為水六府為陽陽井為金滎為水俞為木經為火合為土以陰井木配陽井金是陰陽夫婦之義故云乙為庚之柔庚為乙之剛余並如此也虞所克者為妻謂孤陽不生孤陰不長故井滎亦名夫婦剛柔相因而成也徐靈本輸篇藏井屬木府井屬金其餘滎俞所屬俱無明文六十五難曰經言所出為井所入為合其法奈何然所出為井井者東方春也萬物之始生故言所出為井也所入為合合者北方冬也陽氣入藏故言所入為合也楊奈何猶如何也春夏主生養故陽氣在外秋冬主收藏故陽氣在內人亦法之六十六難曰經言肺之原出於太淵心之原出於太陵肝之原出於太衝脾之原出於太白腎之原出於太溪少陰之原出於兌骨膽之原出於丘墟胃之原出於衝陽三焦之原出於陽池膀胱之原出於京骨大腸之原出於合谷小腸之原出於腕骨十二經皆以俞為原者何也然五藏俞者三焦之所行氣之所留止也三焦所行之俞為原者何也然臍下腎間動氣者人之生命也十二經之根本也故名曰原三焦者原氣之別使也主通行三氣經歷於五藏六府原者三焦之尊號也故所止輒為原五藏六府之有病者皆取其原也楊此皆五藏俞也所以五藏皆以俞為原少陰真心脈也亦有原在掌後兌骨端陷者中一名神門一名中都前云心之原出於太陵者是心胞絡脈也凡云心病者皆在心胞絡脈矣真心不病故無俞今有原者外經之病不治內藏也滑肺之原太淵至腎之原太溪見靈樞第一篇其第二篇曰肺之俞太淵心之俞太陵肝之俞太衝脾之俞太白腎之俞太溪膀胱之俞束骨過於京骨為原膽之俞臨泣過於丘墟為原胃之俞陷谷過於衝陽為原三焦之俞中渚過於陽池為原小腸之俞後溪過於腕骨為原大腸之俞三間過於合谷為原蓋五藏陰經止以俞為原六府陽經既有俞仍別有原靈樞七十一篇曰少陰無輸心不病乎岐伯曰其外經病而藏不病故獨取其經於掌後兌骨之端也又第二篇曰心出於中衝溜於勞宮注於太陵行於間使入於曲澤手少陰也又素問繆刺論曰刺手心主少陰兌骨之端各一痏立已又氣穴論曰藏俞五十七穴王注五藏俞惟有心包絡井俞之穴而亦無心經井俞穴又七十九難曰假令心病寫手心主俞補手心主井詳此各經文則手少陰與心主同治也按甲乙經曰太淵在掌後陷者中央太陵在掌後兩筋間陷者中太衝在足大指本節後二寸太白在足內側核骨下陷者中太溪在足內踝後跟骨上動脈陷者中丘墟在足外廉踝下如前陷者中衝陽在足趺上五寸骨間動脈上陽池在手表上腕上陷者中京骨在足外側大骨赤白肉際合谷在手大指次指間腕骨在手外側腕前起骨下陷者中按此段三焦與三十一難所謂同弟堅曰通行三氣之三當是生字八難生氣之原呂注作三氣之原可證禮樂記曰合生氣之和道五常之行鄭玄注生氣陰陽氣也紀天錫為三焦之氣誤矣太素經亦作行元氣出於醫家千字文注六十七難曰五藏募皆在陰而俞在陽者何謂也然陰病行陽陽病行陰故令募在陰俞在陽楊腹為陰五藏之募皆在腹故云募皆在陰背為陽五藏之俞皆在背故云俞皆在陽內藏有病則出行於陽陽俞在外也外體有病則入行於陰陰募在腹也故針法云從陽引陰從陰引陽此之謂也滑俞史扁鵲傳作輸猶委輸之輸言經氣由此而輸於彼也徐六府募亦在陰俞亦在陽不特五藏為然又下節陰陽並舉為言疑五藏下當有六府二字按募俞經無明文素問通評虛實論腹暴滿按之不下取太陽經絡者胃之募也按先子曰募檢字書曰廣求也無干人身之義因考素靈諸篇募者幕之訛也幕舊從肉作膜素問太陰陽明論曰脾與胃以膜相連新校正云太素膜作幕又瘧論曰邪氣內薄於五藏橫連募原新校正云全元起本募作膜又痿論曰肝主身之筋膜靈樞邪客篇曰地有林木人有募筋此募幕字形相近故易訛也素問舉痛論曰寒氣客於腸胃之間膜原之下又曰寒氣客於小腸膜原之間靈樞百病始生篇曰虛邪之中人也傳舍於腸胃之外募原之間又曰或著於腸胃之募原蓋膜者內在各藏各府之間而外連於軀殼矣藏府之位於人身也背部則其氣從脊骨間而輸出腹部則其幕連著於皮肉故孔穴之直其次者在背謂之俞在腹謂之幕肝幕期門膽幕日月之類是也素問通評虛實論及此段俱訛從力作募後人不察遂相襲用本義曰募猶募結之募抑亦失考六十八難曰五藏六府各有井滎俞經合皆何所主然經言所出為井所流為滎所注為俞所行為經所入為合井主心下滿滎主身熱俞主體重節痛經主喘咳寒熱合主逆氣而泄此五藏六府其井滎俞經合所主病也呂井者木木者肝肝主滿也滎者火火者心心主身熱也俞者土土者脾脾主體重也經者金金主肺肺主寒熱也合者水水主腎腎主泄也虞腎氣不足傷於衝脈則氣逆而裡急腎主開竅於二陰腎氣不禁故泄注謝此舉五藏之病各一端為例余病可以類推而互取也不言六府者舉藏足以該之徐出始發源也流漸盛能流動也注流所向注也行通達條貫也入藏納歸宿也五句本靈九針十二原篇文流作溜義同按自六十二難至此論俞穴是為第五篇六十九難曰經言虛者補之實者瀉之不實不虛以經取之何謂也然虛者補其母實者瀉其子當先補之然後瀉之不實不虛以經取之者是正經自生病不中他邪也當自取其經故言以經取之滑靈樞第十篇載十二經皆有盛則瀉之虛則補之不盛不虛以經取之虛者補其母實者瀉其子子能令母實母能令子虛也假令肝病虛即補厥陰之合曲泉是也實則瀉厥陰之榮行間是也先補後瀉即後篇陽氣不足陰氣有餘當先補其陽而後瀉其陰之意然於此義不屬非闕誤即羡文也不實不虛以經取之者即四十九難憂愁思慮則傷心形寒飲冷則傷肺云者蓋正經之自病者也楊氏云不實不虛是謂藏不相乘也故云自取其經按自六十九難至八十一難論針法是為第六篇七十難曰經言春夏刺淺秋冬刺深者何謂也然春夏者陽氣在上人氣亦在上故當淺取之秋冬者陽氣在下人氣亦在下故當深取之楊經言春氣在毫毛夏氣在皮膚秋氣在分肉冬氣在筋骨此四時之氣也其四時受病亦各隨正氣之深淺故用針者治病各依四時氣之深淺而取之也徐陽氣謂天地之氣人氣謂營衛之氣上謂皮肉之上下謂筋骨之中春夏各致一陰秋冬各致一陽者何謂也然春夏溫必致一陰者初下針沉之至腎肝之部得氣引持之陰也秋冬寒必致一陽者初內針淺而浮之至心肺之部得氣推內之陽也是謂春夏必致一陰秋冬必致一陽虞經言春夏養陽言取一陰之氣以養於陽慮成孤陽致者到也及也言到於腎肝引持一陰之氣肝腎陰也秋冬養陰言至陰用事無陽氣以養其陰故取一陽之氣以養於陰免成孤陰也心肺乃陽也丁人之肌膚皆有厚薄之處但皮膚之上為心肺之部陽氣所行肌肉之下為腎肝之部陰氣所行其春夏陽氣上騰所用針沉手內針至腎肝之部得氣引持陰氣以和其陽氣故春夏必致一陰也秋冬陰氣下致所用針浮手至心肺之部得氣推內針入引持陽氣以和其陰氣也故秋冬必致一陽也七十一難曰經言刺榮無傷衛刺衛無傷榮何謂也然針陽者臥針而刺之刺陰者先以左手攝按所針榮俞之處氣散乃內針是謂刺榮無傷衛刺衛無傷榮也丁人之榮為陰衛為陽二者為之表裡其臥針取之恐傷於榮也針榮先以左手攝按所刺之穴令陽散而內針者蓋恐傷於衛也滑無毋通禁止辭徐此即素刺齊論所云刺骨無傷筋刺筋無傷肉刺肉無傷脈刺脈無傷皮刺皮無傷肉刺刺肉無傷筋刺筋無傷骨之義按臥針之法即靈官針篇浮刺之法攝按散氣即素離合真邪論捫而循之切而散之之義然經文各別有義此取之以為刺陽刺陰之道義亦為當七十二難曰經言能知迎隨之氣可令調之調氣之方必在陰陽何謂也然所謂迎隨者知榮衛之流行經脈之往來也隨其逆順而取之故曰迎隨調氣之方必在陰陽者知其內外表里隨其陰陽而調之故曰調氣之方必在陰陽滑迎隨之法補瀉之道也迎者迎而奪之隨者隨而濟之然必知榮衛之流行經脈之往來榮衛流行經脈往來其義一也知之而後可以視夫病之逆順隨其所當而為補瀉也在察也內為陰外為陽表為陽里為陰察其病之在陰在陽而調之也徐靈終始篇云陽受氣於四末陰受氣於五藏故寫者迎之補者隨之知迎知隨氣可令和和氣之方必通陰陽所引經文本此七十三難曰諸井者肌肉淺薄氣少不足使也刺之奈何然諸井者木也滎者火也火者木之子當刺井者以滎瀉之故經言補者不可以為瀉瀉者不可以為補此之謂也丁諸井在手足指稍故言肌肉淺薄也井為木是火之母滎為火是木之子故肝木實瀉其滎滑諸經之井皆在手足指稍肌肉淺薄之處氣少不足使為補瀉也故設當刺井者只瀉其滎以井為木滎為火火者木之子也詳越人此說專為瀉井者言也若當補井則必補其合故引經言補者不可以為瀉瀉者不可以為補各有攸當也補瀉反則病益篤而有實實虛虛之患可不謹歟七十四難曰經言春刺井夏刺滎季夏刺俞秋刺經冬刺合者何謂也然春刺井者邪在肝夏刺滎者邪在心季夏刺俞者邪在脾秋刺經者邪在肺冬刺合者邪在腎楊經云冬刺井春刺滎此乃云春刺井夏刺滎理極精奇是變通之義也滑滎俞之系四時者以其邪各有所在也按楊注所引經文見於靈樞順氣一日分為四時篇其肝心脾肺腎而繫於春夏秋冬者何也然五藏一病輒有五也假令肝病色青者肝也臊臭者肝也喜酸者肝也喜呼者肝也喜泣者肝也其病衆多不可盡言也四時有數而並繫於春夏秋冬者也針之要妙在於秋毫者也滑五藏一病不止於五其病尤衆多也雖其衆多而四時有數故病繫於春夏秋冬及井滎輸經合之屬也用針者必精察之詳此篇文義似有缺誤今且依此解之徐言病雖萬變而四時實有定數治之之法總不出此其道約易行也七十五難曰經言東方實西方虛瀉南方補北方何謂也然金木水火土當更相平東方木也西方金也木欲實金當平之火欲實水當平之土欲實木當平之金欲實火當平之水欲實土當平之東方肝也則知肝實西方肺也則知肺虛瀉南方火補北方水南方火火者木之子也北方水水者木之母也水勝火子能令母實母能令子虛故瀉火補水欲令金不得平木也經曰不能治其虛何問其餘此之謂也丁平者調四方虛實之法也滑金不得平木不字疑衍也東方實西方虛瀉南方補北方者木金火水欲更相平也木火土金水之欲實五行之貪勝而務權也金木水火土之相平以五行所勝而制其貪也經云一藏不平所勝平之東方實則知西方虛矣若西方不虛則東方安得而過於實邪或瀉或補要亦抑其甚而濟其不足損過就中之道也徐水勝火木之母勝木之子也子能令母實瀉子則火勢益衰而水得以恣其克伐母能令子虛補母則水勢益旺而火不敢留其有餘如此則火不能剋金而反仰食木之氣以自給使金氣得伸而木日就衰金自能平木也子母二字諸傢俱以木為火之母水為金之子為言義遂難曉觀本文以水勝火三字接下明明即指上文木之子木之母也末句引經言若此義不明則治虛之法且不能安能治他病乎按六十九難云虛則補母實則瀉子今實則瀉子補母虛則反補其子義雖俱有可通而法則前後互異未知何故按此段諸說未確徐說頗為明備是言金之性本剋木木欲實者當調平之而今金虛不能施其令反為木所凌故補木所母之水則水勢汪洋足以更助金瀉木所子之火火勢既衰必仰救於木木既救之則其過實之勢又衰不暇以凌金金不受凌則虛者必復復則遂得平木之實者矣水既剋火則其勢益實是所以木之母勝木之子而謂之子令母實母令子虛也七十六難曰何謂補瀉當補之時何所取氣當瀉之時何所置氣然當補之時從衛取氣當瀉之時從榮置氣其陽氣不足陰氣有餘當先補其陽而後瀉其陰陰氣不足陽氣有餘當先補其陰而後瀉其陽榮衛通行此其要也滑靈樞五十二篇曰浮氣之不循經者為衛氣其精氣之行於經者為榮氣蓋補則取浮氣之不循經者以補虛處瀉則從榮置其氣而不用也置猶棄置之置然人病虛實不一補瀉之道亦非一也是以陽氣不足而陰氣有餘則先補陽而後瀉陰以和之陰氣不足而陽氣有餘則先補陰而後瀉陽以和之如此則榮衛自然通行矣徐何所置氣言取何氣以為補而其所瀉之氣則置之何地也從榮置氣謂散其氣於營中也靈終始篇云陰盛而陽虛先補其陽後瀉其陰而和之陰虛而陽盛先補其陰後瀉其陽而和之此其說之所本也七十七難曰經言上工治未病中工治已病者何謂也然所謂治未病者見肝之病則知肝當傳之與脾故先實其脾氣無令得受肝之邪故曰治未病焉中工治已病者見肝之病不曉相傳但一心治肝故曰治已病也楊五藏得病皆傳其所勝肝病傳脾之類也若當其王時則不受傳即不須行此方也按上工治未病不治已病見於靈樞逆順篇謂刺邪之未盛與已衰而為其治五藏傳邪之義又見於金匱要略七十八難曰針有補瀉何謂也然補瀉之法非必呼吸出內針也然知為針者信其左不知為針者信其右當刺之時必先以左手厭按所針榮俞之處彈而努之爪而下之其氣之來如動脈之狀順針而刺之得氣因推而內之是為補動而伸之是謂瀉不得氣乃與男外女內不得氣是謂十死不治也本義經釋無然知之知字滑彈而努之鼓勇之也努讀若怒也爪而下之掐之稍重皆欲致其氣之至也氣至指下如動脈之狀乃乘其至而刺之順猶循也乘也停針待氣氣至針動是得氣也此段越人心法非呼吸出內者也氣久而不至乃與男子則淺其針而候之衛氣之分女子則深其針而候之榮氣之分如此而又不得氣是謂其病終不可治也篇中前後二氣字不同不可不辨前言氣之來如動脈狀未刺之前左手所候之氣也後言得氣不得氣針下所候之氣也此自兩節徐素離合真邪論云吸則內針無令氣忤候呼引針呼盡乃去大氣皆出故命曰瀉呼盡內針靜以久留以氣至為故候吸引針氣不得出各在其處推闔其門令神氣存大氣留止故命曰補此呼吸出內之法越人以為其道不盡於此也信其左謂其法全在善用其左手也信其右即呼吸出內針也按音釋厭益涉切非厭壓古通說文曰壓壞也一曰塞補從土厭聲厭按即塞按所針之俞也七十九難曰經言迎而奪之安得無虛隨而濟之安得無實虛之與實若得若失實之與虛若有若無何謂也然迎而奪之者瀉其子也隨而濟之者補其母也假令心病瀉手心主俞是謂迎而奪之者也補手心主井是謂隨而濟之者也所謂實之與虛者牢濡之意也氣來實牢者為得濡虛者為失故曰若得若失也虞心病卻瀉手心主俞心者法不受病受病者心包絡也手心主者則手厥陰心包絡也包絡中俞者土也心火也土是火子乃瀉其俞此乃寫子也迎謂取氣奪謂瀉氣也心火井木今補心主之井謂補母也木者火之母也隨謂自衛取氣濟謂補不足之經滑問辭出靈樞第一篇得求而獲也失縱也遺也其第二篇云言實與虛若有若無者調實者有氣虛者無氣也言虛與實若得若失者謂補者必然若有得也瀉者恍然若有失也即第一篇之義迎者迎於前隨者隨其後氣來實牢濡虛以隨濟迎奪而為得失也蓋得失有無義實相同互舉之省文爾徐此子母即以本經井俞所屬五行生剋言非如七十五難指五藏所屬子母也氣指針下之氣也其氣來而充實堅牢為得濡弱虛微為失言得失則有無在其中矣八十難曰經言有見如入有見如出者何謂也然所謂有見如入者謂左手見氣來至乃內針針入見氣盡乃出針是謂有見如入有見如出也丁欲刺人脈先以左手候其穴中之氣其氣來而內針候氣盡乃出其針者非迎隨補瀉之穴也滑所謂有見如入下當缺有見如出四字如讀若而孟子書望道而未之見而讀若如蓋通用也八十一難曰經言無實實虛虛損不足而益有餘是寸口脈耶將病自有虛實耶其損益奈何然是病非謂寸口脈也謂病自有虛實也假令肝實而肺虛肝者木也肺者金也金木當更相平當知金平木假令肺實而肝虛微少氣用針不補其肝而反重實其肺故曰實實虛虛損不足而益有餘此者中工之所害也楊上工治未病知其虛實之原故補瀉而得其宜中工未審傳病之本所治反增其害也滑肝實肺虛金當平木如七十五難之說若肺實肝虛則當抑金而扶木也中工中常之工猶云粗工也按自六十九難至此論針法是為第六篇
